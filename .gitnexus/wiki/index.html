var PAGES = {"backup":"# Backup\n\n**Backup Module Documentation**\n\n**Overview**\n------------\n\nThe Backup module is responsible for creating backups of critical data stores, including Minio and PostgreSQL databases. It provides a simple and efficient way to automate backup processes, ensuring data integrity and availability.\n\n**Purpose**\n----------\n\nThe primary purpose of the Backup module is to provide a reliable and automated backup solution for critical data stores. This ensures that data is regularly backed up, reducing the risk of data loss in case of hardware failure or other disasters.\n\n**How it Works**\n----------------\n\nThe Backup module consists of two main scripts: `backup_minio.ps1` and `backup_postgres.ps1`. These scripts are executed using PowerShell, which provides a flexible and powerful environment for automating tasks.\n\n### Minio Backup Script (`backup_minio.ps1`)\n\nThe `backup_minio.ps1` script is responsible for backing up data from a Minio bucket. Here's an overview of the script:\n\n*   It takes three parameters: `$Alias`, `$Bucket`, and `$OutputDir`.\n*   The script checks if the `$Bucket` parameter is empty, throwing an error if it is.\n*   It creates a new directory at the specified `$OutputDir` using `New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null`.\n*   It generates a timestamp and constructs the output file path by joining the `$OutputDir`, `$Bucket`, and timestamp.\n*   The script uses `mc mirror` to copy data from the Minio bucket to the local machine, creating a mirrored copy of the data.\n\n### PostgreSQL Backup Script (`backup_postgres.ps1`)\n\nThe `backup_postgres.ps1` script is responsible for backing up data from a PostgreSQL database. Here's an overview of the script:\n\n*   It takes two parameters: `$DatabaseUrl` and `$OutputDir`.\n*   The script checks if the `$DatabaseUrl` parameter is empty, throwing an error if it is.\n*   It creates a new directory at the specified `$OutputDir` using `New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null`.\n*   It generates a timestamp and constructs the output file path by joining the `$OutputDir`, \"legal-platform\", and timestamp.\n*   The script uses `pg_dump` to dump the PostgreSQL database, saving the output to a local file.\n\n**Key Components**\n------------------\n\nThe Backup module consists of two main components:\n\n*   **Minio Mirror**: A PowerShell cmdlet that mirrors data from a Minio bucket to the local machine. This component is used in the `backup_minio.ps1` script.\n*   **pg_dump**: A PostgreSQL database tool that dumps the database, saving the output to a local file. This component is used in the `backup_postgres.ps1` script.\n\n**Integration with the Codebase**\n------------------------------\n\nThe Backup module integrates with the rest of the codebase through the following means:\n\n*   **Environment Variables**: The module uses environment variables (`$S3_BUCKET` and `$DATABASE_URL`) to store sensitive data, such as Minio bucket names and PostgreSQL database URLs.\n*   **PowerShell Execution**: The module is executed using PowerShell, which provides a flexible and powerful environment for automating tasks.\n\n**Call Graph & Execution Flows**\n------------------------------\n\nThe Backup module has the following call graph and execution flows:\n\nInternal calls: None\n\nOutgoing calls: `mc mirror` (Minio Mirror)\n\nIncoming calls: None\n\nExecution flows: No execution flows detected for this module.\n\n**Mermaid Diagram**\n-----------------\n\n```mermaid\ngraph LR\n    A[Backup Module] -->|PowerShell Execution|> B[Minio Mirror]\n    B -->|mc mirror|> C[Local Machine]\n    D[PostgreSQL Database] -->|pg_dump|> E[Local File]\n```\n\nThis Mermaid diagram illustrates the call graph and execution flows of the Backup module. It shows how the module is executed using PowerShell, which calls the Minio Mirror cmdlet to mirror data from a Minio bucket to the local machine. Additionally, it shows how the PostgreSQL database is dumped using `pg_dump`, saving the output to a local file.\n\n**Troubleshooting**\n------------------\n\nTo troubleshoot issues with the Backup module, follow these steps:\n\n*   Check the environment variables (`$S3_BUCKET` and `$DATABASE_URL`) to ensure they are set correctly.\n*   Verify that the Minio bucket and PostgreSQL database exist and are accessible.\n*   Check the PowerShell execution logs for any errors or warnings.\n\nBy following these troubleshooting steps, you can identify and resolve issues with the Backup module, ensuring data integrity and availability.","citationmetadata":"# CitationMetadata\n\n**CitationMetadata Module Documentation**\n\n**Overview**\n------------\n\nThe CitationMetadata module is responsible for managing metadata related to citations in the application. It provides functionality for validating, formatting, and creating labels for citation metadata.\n\n**Purpose**\n----------\n\nThe primary purpose of this module is to ensure that citation metadata is accurate and consistent across the application. It achieves this by providing a set of APIs for validating, formatting, and creating labels for citation metadata.\n\n**Key Components**\n-----------------\n\n### CitationMetadata Interface\n\nThe `CitationMetadata` interface defines the structure of citation metadata, including fields such as `eli`, `fonte`, `tipoAtto`, `numeroAtto`, `dataAtto`, `articolo`, and others.\n\n```typescript\nexport interface CitationMetadata {\n  eli: string;\n  fonte: string;\n  tipoAtto: ActType;\n  numeroAtto: string;\n  dataAtto: string;\n  articolo: string;\n  comma?: string;\n  vigenzaDa: string;\n  vigenzaA?: string;\n  urlFonte?: string;\n  idArtefattoFonte?: string;\n}\n```\n\n### CitationMetadataError Class\n\nThe `CitationMetadataError` class is thrown when citation metadata validation fails. It provides a list of missing fields.\n\n```typescript\nexport class CitationMetadataError extends Error {\n  constructor(public readonly missingFields: readonly string[]) {\n    super(`Metadati di citazione obbligatori mancanti: ${missingFields.join(\", \")}`);\n    this.name = \"CitationMetadataError\";\n  }\n}\n```\n\n### validateCitationMetadata Function\n\nThe `validateCitationMetadata` function validates citation metadata by checking for missing fields and ensuring that all required fields are present.\n\n```typescript\nexport function validateCitationMetadata(\n  metadata: Partial<CitationMetadata>\n): CitationValidationResult {\n  const missingFields = REQUIRED_CITATION_FIELDS.filter((field) => {\n    const value = metadata[field];\n    return typeof value !== \"string\" || value.trim().length === 0;\n  });\n\n  if (!metadata.urlFonte && !metadata.idArtefattoFonte) {\n    return {\n      valid: false,\n      missingFields: [...missingFields, \"urlFonte|idArtefattoFonte\"]\n    };\n  }\n\n  return {\n    valid: missingFields.length === 0,\n    missingFields\n  };\n}\n```\n\n### assertCitationMetadata Function\n\nThe `assertCitationMetadata` function asserts that citation metadata is valid by calling `validateCitationMetadata` and throwing a `CitationMetadataError` if validation fails.\n\n```typescript\nexport function assertCitationMetadata(\n  metadata: Partial<CitationMetadata>\n): asserts metadata is CitationMetadata {\n  const result = validateCitationMetadata(metadata);\n\n  if (!result.valid) {\n    throw new CitationMetadataError(result.missingFields);\n  }\n}\n```\n\n### createChunk Function\n\nThe `createChunk` function creates a chunk of data by combining citation metadata with other data.\n\n```typescript\nexport function createChunk(input: {\n  id: string;\n  unitaId: string;\n  testo: string;\n  embedding?: readonly number[];\n  metadati: Partial<CitationMetadata>;\n}): Chunk {\n  assertCitationMetadata(input.metadati);\n\n  return {\n    id: input.id,\n    unitaId: input.unitaId,\n    testo: input.testo,\n    embedding: input.embedding,\n    metadati: input.metadati\n  };\n}\n```\n\n### createCitationLabel Function\n\nThe `createCitationLabel` function creates a citation label by formatting citation metadata.\n\n```typescript\nexport function createCitationLabel(metadata: CitationMetadata): string {\n  const comma = metadata.comma ? `, comma ${metadata.comma}` : \"\";\n  const validity = metadata.vigenzaA\n    ? `vigente dal ${metadata.vigenzaDa} al ${metadata.vigenzaA}`\n    : `vigente dal ${metadata.vigenzaDa}`;\n  const tipoAtto = formatActTypeForLabel(metadata);\n\n  return `${tipoAtto} ${metadata.numeroAtto}/${metadata.dataAtto}, art. ${metadata.articolo}${comma} (${validity})`;\n}\n```\n\n### formatActTypeForLabel Function\n\nThe `formatActTypeForLabel` function formats the act type for a citation label.\n\n```typescript\nfunction formatActTypeForLabel(metadata: CitationMetadata): string {\n  if (metadata.eli.includes(\"/regio-decreto/\")) {\n    return \"regio decreto\";\n  }\n\n  if (metadata.eli.includes(\"/decreto-legislativo/\")) {\n    return \"decreto legislativo\";\n  }\n\n  if (metadata.eli.includes(\"/decreto-legge/\")) {\n    return \"decreto legge\";\n  }\n\n  return metadata.tipoAtto;\n}\n```\n\n**Connection to the Rest of the Codebase**\n----------------------------------------\n\nThe CitationMetadata module connects to other parts of the codebase through various APIs and functions.\n\n*   The `createChunk` function is called by the `parseAkomaNtosoDocument` function in the `ingest` module.\n*   The `createCitationLabel` function is called by the `cercaCorpusLegaleIbrido` function in the `retrieval` module.\n*   The `validateCitationMetadata` and `assertCitationMetadata` functions are used throughout the codebase to validate citation metadata.\n\n**Mermaid Diagram**\n------------------\n\nHere is a Mermaid diagram that illustrates the connection between the CitationMetadata module and other parts of the codebase:\n```mermaid\ngraph LR\n    A[parseAkomaNtosoDocument] -->|calls createChunk|> B(createChunk)\n    B -->|asserts citation metadata|> C(assertCitationMetadata)\n    C -->|throws error if invalid|> D(CitationMetadataError)\n    E[cercaCorpusLegaleIbrido] -->|calls createCitationLabel|> F(createCitationLabel)\n    F -->|format act type for label|> G(formatActTypeForLabel)\n    H[leggiFonte] -->|calls leggiFonteDaDatabase|> I(leggiFonteDaDatabase)\n    I -->|calls createCitationLabel|> J(createCitationLabel)\n```\nThis diagram shows the flow of data from the `parseAkomaNtosoDocument` function to the `createChunk` function, and then to the `assertCitationMetadata` function. It also shows the connection between the CitationMetadata module and other parts of the codebase through APIs such as `cercaCorpusLegaleIbrido` and `leggiFonte`.","corpusnormattiva":"# CorpusNormattiva\n\n**CorpusNormattiva Module Documentation**\n\n**Overview**\n------------\n\nThe CorpusNormattiva module is responsible for storing and archiving documents related to normative sources in a corpus. It provides two storage options: file system-based and Amazon S3-based, allowing users to choose the most suitable option for their needs.\n\n**Purpose**\n----------\n\nThe primary purpose of this module is to provide a standardized way of storing and managing normative source documents, ensuring that they are properly archived and easily accessible for future reference.\n\n**How it Works**\n----------------\n\nThe CorpusNormattiva module consists of several key components:\n\n1.  **Storage Options**: The module provides two storage options: `FileSystemObjectStorage` and `S3ObjectStorage`. These classes handle the actual storage of documents, ensuring that they are properly archived and retrievable.\n2.  **ArchiviazioneOggetti Interface**: This interface defines a contract for archiving objects, which is implemented by both storage classes. It provides methods for saving artifacts (documents) to storage.\n3.  **creaArchiviazioneOggettiDaEnv Function**: This function creates an instance of the chosen storage class based on the environment variables set in the `process.env` object.\n\n**Key Components**\n-----------------\n\n### Storage Classes\n\n#### FileSystemObjectStorage\n\n*   **Description**: This class provides a file system-based storage option. It stores documents in a directory structure defined by the user.\n*   **Methods**:\n    *   `salvaArtefatto(input)`: Saves an artifact (document) to storage.\n\n#### S3ObjectStorage\n\n*   **Description**: This class provides an Amazon S3-based storage option. It uses the AWS SDK to store documents in an S3 bucket.\n*   **Methods**:\n    *   `salvaArtefatto(input)`: Saves an artifact (document) to S3.\n\n### ArchiviazioneOggetti Interface\n\nThis interface defines a contract for archiving objects, which is implemented by both storage classes. It provides methods for saving artifacts (documents) to storage.\n\n**Connection to the Rest of the Codebase**\n-----------------------------------------\n\nThe CorpusNormattiva module connects to other parts of the codebase through various APIs and functions:\n\n*   **salvaDocumentoUtente**: This function saves a user document to storage, which in turn calls `creaArchiviazioneOggettiDaEnv` to determine the storage class.\n*   **eseguiIngestNormattivaLocale**: This function executes the ingestion process for normative sources, which includes calling `archiviaFontiCorpus`.\n*   **ingest.test.ts**: This test file tests the functionality of the CorpusNormattiva module.\n\n**Mermaid Diagram: Storage Flow**\n---------------------------------\n\n```mermaid\ngraph LR\n    A[POST (api/documents/route.ts)] -->|salvaDocumentoUtente|> B[creaArchiviazioneOggettiDaEnv]\n    B -->|S3ObjectStorage|> C[S3ObjectStorage]\n    C -->|salvaArtefatto|> D[PutObjectCommand]\n    D -->|s3://${bucket}/${input.chiave}|> E[s3://bucket/input.chiave]\n    B -->|FileSystemObjectStorage|> F[FileSystemObjectStorage]\n    F -->|salvaArtefatto|> G[writeFile]\n    G -->|file://{percorso.replaceAll(\"\\\\\", \"/\")}|> H[file:///percorso]\n```\n\nThis Mermaid diagram illustrates the storage flow, showing how `creaArchiviazioneOggettiDaEnv` determines the storage class and then calls the corresponding method to save the artifact (document) to storage.","database":"# Database\n\n**Database Module Documentation**\n\n**Overview**\n\nThe Database module is responsible for managing data storage and retrieval in the application. It provides a layer of abstraction between the business logic and the underlying database, allowing for easier maintenance and scalability.\n\n**Purpose**\n\nThe primary purpose of the Database module is to provide a unified interface for interacting with various databases, including document stores, relational databases, and NoSQL databases. This allows developers to focus on writing business logic without worrying about the underlying data storage mechanisms.\n\n**How it Works**\n\nThe Database module consists of several key components:\n\n1. **Database Abstraction Layer (DAL)**: The DAL provides a unified interface for interacting with different databases. It encapsulates the database-specific details, such as connection pooling, query execution, and data serialization.\n2. **Repository Pattern**: The Repository pattern is used to abstract the data access logic from the business logic layer. This allows for easier testing, maintenance, and scalability.\n3. **Query Builder**: The Query Builder provides a way to construct SQL queries or other database-specific queries in a type-safe manner.\n\n**Key Components**\n\n1. **PostgresIngestJobRepository**: Responsible for managing ingest jobs, including starting, stopping, and completing them.\n2. **PostgresLegalRepository**: Responsible for managing legal documents, including inserting, updating, and retrieving them.\n3. **PostgresReviewRepository**: Responsible for managing review data, including inserting, updating, and retrieving it.\n4. **PostgresDocumentRepository**: Responsible for managing document data, including inserting, updating, and retrieving it.\n\n**Connection to the Rest of the Codebase**\n\nThe Database module connects to other parts of the codebase through various interfaces:\n\n1. **Ingest API**: The Ingest API provides a way to start ingest jobs, which are managed by the PostgresIngestJobRepository.\n2. **Legal API**: The Legal API provides a way to manage legal documents, which are stored in the PostgresLegalRepository.\n3. **Review API**: The Review API provides a way to manage review data, which is stored in the PostgresReviewRepository.\n4. **Document API**: The Document API provides a way to manage document data, which is stored in the PostgresDocumentRepository.\n\n**Mermaid Diagram**\n\n```mermaid\ngraph LR\n    A[Ingest API] -->|start ingest job|> B(PostgresIngestJobRepository)\n    B -->|complete ingest job|> C(Ingest status page)\n    A -->|insert document|> D(PostgresDocumentRepository)\n    D -->|update document|> E(PostgresDocumentRepository)\n    A -->|retrieve document|> F(PostgresDocumentRepository)\n    G[Legal API] -->|insert legal document|> H(PostgresLegalRepository)\n    H -->|update legal document|> I(PostgresLegalRepository)\n    G -->|retrieve legal document|> J(PostgresLegalRepository)\n    K[Review API] -->|insert review data|> L(PostgresReviewRepository)\n    L -->|update review data|> M(PostgresReviewRepository)\n    K -->|retrieve review data|> N(PostgresReviewRepository)\n```\n\nThis diagram shows the connections between the Ingest API, PostgresIngestJobRepository, and other parts of the codebase. It also highlights the relationships between different repositories and APIs.\n\n**API Documentation**\n\nThe Database module provides several APIs for interacting with the databases:\n\n1. **PostgresIngestJobRepository**: Provides methods for starting, stopping, and completing ingest jobs.\n2. **PostgresLegalRepository**: Provides methods for inserting, updating, and retrieving legal documents.\n3. **PostgresReviewRepository**: Provides methods for inserting, updating, and retrieving review data.\n4. **PostgresDocumentRepository**: Provides methods for inserting, updating, and retrieving document data.\n\nEach API has a detailed documentation page that describes the available methods, parameters, and return values.","documentation":"# Documentation\n\n**Documentation Module**\n========================\n\n**Overview**\n------------\n\nThe Documentation module is responsible for validating the integrity of documentation files within the project. It checks for required files, trailing whitespace, and local links in Markdown documents.\n\n**Purpose**\n----------\n\nThe purpose of this module is to ensure that all documentation files are accurate, complete, and properly formatted. This helps maintain a consistent and reliable source of information for developers and users alike.\n\n**How it Works**\n----------------\n\nThe Documentation module consists of several key components:\n\n*   **Required Files Validation**: The `validate_required_files` function checks if all required documentation files (e.g., README.md, ROADMAP.md) exist in the correct locations.\n*   **Trailing Whitespace Detection**: The `validate_trailing_whitespace` function verifies that Markdown documents do not contain trailing whitespace.\n*   **Local Link Resolution**: The `validate_local_links` function ensures that local links in Markdown documents are properly resolved and point to existing files.\n\nHere's a high-level overview of the execution flow:\n\n1.  The `main` function is called when the script is executed.\n2.  It validates required files using `validate_required_files`.\n3.  If all required files exist, it sorts and filters Markdown files using `rglob` and `is_skipped`.\n4.  It then calls `validate_trailing_whitespace` to check for trailing whitespace in Markdown documents.\n5.  Finally, it calls `validate_local_links` to resolve local links.\n\n**Key Components**\n-----------------\n\n*   **`ROOT`**: The root directory of the project, used as a reference point for file paths.\n*   **`REQUIRED_FILES`**: A list of required documentation files that must exist in specific locations.\n*   **`LOCAL_LINK_RE`**: A regular expression pattern to match local links in Markdown documents.\n\n**Call Graph & Execution Flows**\n------------------------------\n\nThe following Mermaid diagram illustrates the call graph and execution flows for this module:\n\n```mermaid\ngraph LR\n    A[main] -->|validate_required_files| B[validate_required_files]\n    A -->|validate_trailing_whitespace| C[validate_trailing_whitespace]\n    A -->|validate_local_links| D[validate_local_links]\n    B --> E[fail]\n    C --> E[fail]\n    D --> E[fail]\n```\n\n**Connecting to the Rest of the Codebase**\n-----------------------------------------\n\nThe Documentation module is designed to be integrated with other parts of the codebase. It can be run as a standalone script or incorporated into the build process.\n\nTo use this module, simply execute the `scripts/check_docs.py` script in your terminal. The script will automatically detect and validate documentation files based on the project's structure.\n\n**Troubleshooting**\n------------------\n\nIf you encounter any issues with the Documentation module, refer to the following common error messages:\n\n*   \"File di documentazione obbligatori mancanti\" (Required documentation file missing)\n*   \"Whitespace finale trovato\" (Trailing whitespace detected)\n*   \"Link Markdown locali rotti\" (Local link in Markdown document is broken)\n\nFor more detailed information, please consult the code comments and error messages.","embeddingprovider":"# EmbeddingProvider\n\n**EmbeddingProvider Module Documentation**\n\nThe `EmbeddingProvider` module is responsible for generating embeddings, which are numerical representations of input strings, used in various applications such as text classification, clustering, and information retrieval.\n\n## Purpose\n\nThe primary purpose of this module is to provide a standardized way of generating embeddings across different embedding providers. The module supports two main providers: `EmbeddingDeterministico` (a deterministic provider) and `OpenAICompatibleEmbeddingProvider` (an OpenAI-compatible provider).\n\n## How it Works\n\nThe `EmbeddingProvider` module uses the following steps to generate an embedding:\n\n1. **Tokenization**: The input string is tokenized into individual words or subwords.\n2. **Embedding Generation**: An embedding is generated for each token using a specific algorithm (e.g., Word2Vec, FastText).\n3. **Combination**: The embeddings are combined to form the final embedding.\n\n## Key Components\n\nThe `EmbeddingProvider` module consists of the following key components:\n\n*   **Tokenizer**: Responsible for tokenizing the input string into individual words or subwords.\n*   **Embedding Generator**: Generates an embedding for each token using a specific algorithm (e.g., Word2Vec, FastText).\n*   **Combination Function**: Combines the embeddings to form the final embedding.\n\n## Connection to the Rest of the Codebase\n\nThe `EmbeddingProvider` module connects to the rest of the codebase through the following interfaces:\n\n*   **`creaGeneratoreRispostaDaEnv` function**: Returns an instance of `OpenAICompatibleEmbeddingProvider`.\n*   **`genera` function**: Calls the `generaEmbedding` method on the selected embedding provider.\n*   **`cercaChunkDatabase` function**: Calls the `generaEmbedding` method on the selected embedding provider.\n\n## Architecture Diagram\n\nThe following Mermaid diagram illustrates the architecture of the `EmbeddingProvider` module:\n```mermaid\ngraph LR\n    A[Input String] -->|Tokenization|> B[Tokenizer]\n    B -->|Embedding Generation|> C[Embedding Generator]\n    C -->|Combination|> D[Combination Function]\n    D -->|Final Embedding|> E[Output Embedding]\n    \n    F[OpenAICompatibleEmbeddingProvider] --> G[generaEmbedding]\n    H[EmbeddingDeterministico] --> I[generaEmbedding]\n    \n    J[CercaChunkDatabase] --> K[generaEmbedding]\n```\nThis diagram shows the flow of data from the input string to the final embedding, highlighting the key components and interfaces involved in the process.\n\n## Example Usage\n\nTo use the `EmbeddingProvider` module, you can create an instance of one of the supported providers (e.g., `OpenAICompatibleEmbeddingProvider`) and call the `genera` function:\n```typescript\nconst provider = new OpenAICompatibleEmbeddingProvider();\nconst embedding = await provider.genera('input string');\nconsole.log(embedding);\n```\nSimilarly, you can use the `EmbeddingDeterministico` provider to generate an embedding:\n```typescript\nconst provider = new EmbeddingDeterministico();\nconst embedding = await provider.genera('input string');\nconsole.log(embedding);\n```\nNote that the specific implementation details may vary depending on the chosen provider and the requirements of your application.","evaluation":"# Evaluation\n\n**Evaluation Module Documentation**\n\n**Overview**\n------------\n\nThe Evaluation module is responsible for evaluating the relevance and accuracy of search results in the context of legal texts. It uses natural language processing (NLP) techniques to analyze the search queries, retrieve relevant documents from a corpus, and determine the correctness of the retrieved documents.\n\n**Purpose**\n----------\n\nThe primary purpose of the Evaluation module is to provide a robust evaluation framework for the retrieval system, ensuring that it produces accurate and relevant results for legal searches. This involves assessing the performance of the retrieval algorithm in terms of precision, recall, and F1-score.\n\n**How it Works**\n----------------\n\nThe Evaluation module consists of two main components:\n\n1.  **Query Analysis**: The `valutaCasi` function takes a search query as input and performs the following steps:\n    *   Tokenization: The input query is tokenized into individual words.\n    *   Embedding Generation: An embedding representation is generated for each token using an external language model (LLM).\n    *   Corpus Retrieval: Relevant documents from a corpus are retrieved based on the generated embeddings.\n2.  **Result Evaluation**: The `valutaCasi` function evaluates the retrieved documents and determines their correctness. This involves:\n    *   Document Analysis: Each retrieved document is analyzed to determine its relevance and accuracy.\n    *   Metric Calculation: Precision, recall, and F1-score are calculated for each document.\n\n**Key Components**\n------------------\n\n*   **CasoValutazione**: Represents a single evaluation case, containing attributes such as the search query, document ID, and type of act.\n*   **EsitoCasoValutazione**: Represents the outcome of an evaluation case, including attributes such as the retrieved article, first result, and response status.\n*   **ReportValutazione**: Represents the overall report generated by the Evaluation module, containing metrics such as coverage, precision, and F1-score.\n\n**Connection to the Rest of the Codebase**\n-----------------------------------------\n\nThe Evaluation module interacts with other components in the following ways:\n\n*   **Retrieval Module**: The `valutaCasi` function calls the `rispondiConFontiRag` and `cercaCorpusLegaleIbrido` functions from the Retrieval module to retrieve relevant documents.\n*   **LLM Module**: The Evaluation module uses an external LLM to generate embeddings for each token in the search query.\n*   **Test Suite**: The Evaluation module is tested using a test suite that exercises its functionality and ensures it produces accurate results.\n\n**Call Graph & Execution Flows**\n---------------------------------\n\nThe following Mermaid diagram illustrates the call graph and execution flows of the Evaluation module:\n\n```mermaid\ngraph LR\n    A[Input Query] -->|Tokenization|> B[Embedding Generation]\n    B -->|Corpus Retrieval|> C[Document Analysis]\n    C -->|Metric Calculation|> D[Report Generation]\n    A -->|Result Evaluation|> E[Document Ranking]\n    E -->|Sorting|> F[Final Report]\n```\n\nThis diagram shows the flow of data from the input query to the final report, highlighting the key components and steps involved in the evaluation process.\n\n**Conclusion**\n----------\n\nThe Evaluation module is a critical component of the retrieval system, ensuring that it produces accurate and relevant results for legal searches. Its modular design and clear architecture make it easy to understand and maintain, while its connection to other components in the codebase ensures seamless integration with the rest of the system.","gazzettaufficialeadapter":"# GazzettaUfficialeAdapter\n\n**Normattiva Module Documentation**\n\n**Overview**\n\nThe Normattiva module is responsible for fetching, processing, and converting Normattiva Open Data into a format suitable for use in the application. It provides a unified interface for accessing various sources of Normattiva data, including Gazzetta Ufficiale, EurLex, and Giurisprudenza Aperta.\n\n**Key Components**\n\n1. **NormattivaAdapter**: A class that serves as an adapter between the Normattiva module and other components of the application. It provides a standardized interface for accessing various sources of Normattiva data.\n2. **GazzettaUfficialeAdapter**: A class that adapts Gazzetta Ufficiale data into a format suitable for use in the application.\n3. **EurLexAdapter**: A class that adapts EurLex data into a format suitable for use in the application.\n4. **GiurisprudenzaApertaAdapter**: A class that adapts Giurisprudenza Aperta data into a format suitable for use in the application.\n5. **NormattivaOpenDataProcessor**: A class responsible for processing and converting Normattiva Open Data into a format suitable for use in the application.\n\n**How it Works**\n\nThe Normattiva module follows these steps:\n\n1. The `main` function in the `worker/src/cli.ts` file initializes the Normattiva module by calling the `leggiStatoIngestDaEnv` function.\n2. The `leggiStatoIngestDaEnv` function fetches the current state of the ingestion process from the environment variables and calls the `fontiCatalogabili` function to retrieve a list of available fonti catalogabili.\n3. The `fontiCatalogabili` function returns a list of available fonti catalogabili, which are then used to create instances of the corresponding adapters (e.g., GazzettaUfficialeAdapter, EurLexAdapter, etc.).\n4. Each adapter is responsible for fetching and processing data from its respective source.\n5. The processed data is then passed to the `NormattivaOpenDataProcessor` class, which converts it into a format suitable for use in the application.\n\n**Connection to Other Components**\n\nThe Normattiva module connects to other components of the application through the following interfaces:\n\n* **GazzettaUfficialeAdapter**: Exposed through the `get` function in the `ingest/status/route.ts` file.\n* **EurLexAdapter**: Exposed through the `get` function in the `ingest/status/route.ts` file.\n* **GiurisprudenzaApertaAdapter**: Exposed through the `get` function in the `ingest/status/route.ts` file.\n* **NormattivaOpenDataProcessor**: Exposed through the `text` function in the `api/documents/route.ts` file.\n\n**Mermaid Diagram**\n\n```mermaid\ngraph LR\n    A[main] -->|leggiStatoIngestDaEnv|> B[fontiCatalogabili]\n    B -->|fontiCatalogabili|> C[GazzettaUfficialeAdapter]\n    C -->|GazzettaUfficialeAdapter|> D[NormattivaOpenDataProcessor]\n    B -->|fontiCatalogabili|> E[EurLexAdapter]\n    E -->|EurLexAdapter|> F[NormattivaOpenDataProcessor]\n    B -->|fontiCatalogabili|> G[GiurisprudenzaApertaAdapter]\n    G -->|GiurisprudenzaApertaAdapter|> H[NormattivaOpenDataProcessor]\n    A -->|NormattivaOpenDataProcessor|> I[text]\n```\n\nThis diagram illustrates the flow of data from the `main` function to the `text` function, passing through various adapters and processors along the way.","ingest":"# Ingest\n\n**Ingest Module Documentation**\n\n**Overview**\n\nThe Ingest module is responsible for collecting and processing data from various sources, including legislative documents, court decisions, and other relevant information. Its primary purpose is to provide a centralized platform for ingesting and normalizing data, making it accessible for downstream applications.\n\n**How it Works**\n\nThe Ingest module consists of several key components:\n\n1. **Data Sources**: The module connects to various data sources, including legislative databases, court repositories, and other relevant information systems.\n2. **Data Processing**: Once connected to the data source, the module processes the data using a combination of natural language processing (NLP) techniques and machine learning algorithms.\n3. **Data Normalization**: The processed data is then normalized to ensure consistency and accuracy across different formats and structures.\n4. **Data Storage**: The normalized data is stored in a centralized database, making it accessible for downstream applications.\n\n**Key Components**\n\n1. **Legislative Document Parser**: A custom-built parser that extracts relevant information from legislative documents, including text, metadata, and other relevant details.\n2. **Court Decision Parser**: A parser that extracts relevant information from court decisions, including text, metadata, and other relevant details.\n3. **Data Normalizer**: A module that normalizes the processed data to ensure consistency and accuracy across different formats and structures.\n4. **Database**: A centralized database that stores the normalized data.\n\n**Connections to Other Components**\n\nThe Ingest module connects to various components in the codebase, including:\n\n1. **Retrieval Module**: The Ingest module provides data to the Retrieval module, which uses it for downstream applications such as search and ranking.\n2. **LLM Module**: The Ingest module provides data to the LLM (Large Language Model) module, which uses it for tasks such as text generation and classification.\n3. **Database Module**: The Ingest module stores data in a centralized database, making it accessible for downstream applications.\n\n**Mermaid Diagram**\n\n```mermaid\ngraph LR\n    A[Data Sources] -->|connects to| B[Legislative Document Parser]\n    B -->|processes data| C[Data Normalizer]\n    C -->|normalizes data| D[Database]\n    E[Retrieval Module] -->|uses data from| F[Ingest Module]\n    G[LLM Module] -->|uses data from| H[Ingest Module]\n```\n\n**API Documentation**\n\nThe Ingest module provides several APIs for interacting with the data, including:\n\n1. **`getCorpusDimostrativo`**: Returns a corpus of legislative documents.\n2. **`parseLegge241Esempio`**: Parses a legislative document and returns its metadata.\n3. **`creaManifestoIngest`**: Creates a manifesto for ingesting data from a specific source.\n\n**Troubleshooting**\n\nCommon issues with the Ingest module include:\n\n1. **Data connectivity issues**: Ensure that all data sources are properly connected and configured.\n2. **Data processing errors**: Check the logs for any errors during data processing and normalization.\n3. **Database issues**: Ensure that the database is properly configured and running.\n\n**Conclusion**\n\nThe Ingest module plays a critical role in the codebase, providing a centralized platform for ingesting and normalizing data. Its key components, including the Legislative Document Parser and Data Normalizer, work together to ensure high-quality data is available for downstream applications.","opzioniretrievalibrido":"# OpzioniRetrievalIbrido\n\n**Retrieval Module Documentation**\n\n**Overview**\n\nThe Retrieval module is responsible for fetching relevant data from various sources, processing it, and returning it to the application. Its primary purpose is to provide accurate and up-to-date information to support the application's functionality.\n\n**How it Works**\n\nThe Retrieval module consists of several key components:\n\n1. **Data Sources**: The module connects to various data sources, including:\n\t* Corpus Legale Ibrido (CLIB): a database containing Italian legal texts.\n\t* Corpus Dimostrativo: a collection of documents used for training and testing the model.\n\t* Akoma Ntoso Document: a standardized format for representing legal documents.\n2. **Data Processing**: The module processes the data from the sources, including:\n\t* Tokenization: breaking down text into individual words or tokens.\n\t* Part-of-Speech (POS) Tagging: identifying the grammatical category of each word.\n\t* Named Entity Recognition (NER): identifying named entities in the text.\n3. **Model Inference**: The module uses a machine learning model to infer meaning from the processed data.\n\n**Key Components**\n\n1. **`cercaCorpusLegaleIbrido` function**: fetches data from CLIB and processes it for use in the model.\n2. **`preparaCorpusConEmbedding` function**: prepares the Corpus Dimostrativo for use in the model, including tokenization, POS tagging, and NER.\n3. **`getCorpusDimostrativo` function**: returns the processed Corpus Dimostrativo data.\n4. **`parseCorpusNormattivaEsempio` function**: parses the Akoma Ntoso Document format for use in the model.\n5. **`parseDocumentiNormattivaEsempio` function**: parses documents from CLIB and returns them in a standardized format.\n\n**Connections to Other Modules**\n\nThe Retrieval module connects to other modules through various interfaces:\n\n1. **`retrieval.test.ts`**: provides test cases for the Retrieval module.\n2. **`backend/src/index.ts`**: provides an API for accessing data from CLIB and other sources.\n3. **`evaluation/src/index.ts`**: provides evaluation metrics for the model.\n\n**Mermaid Diagram**\n\n```mermaid\ngraph LR\n    A[Retrieval Module] -->|fetch data|> B[CORPUS LEGALE IBRIDO]\n    B -->|process data|> C[TOKENIZATION]\n    C -->|POS TAGGING|> D[NAMED ENTITY RECOGNITION]\n    D -->|infer meaning|> E[MODEL INFERENCE]\n    F[GET API] -->|access data|> G[CORPUS DIMOSTRAZIONE]\n    H[EVALUATION METRICS] -->|evaluate model|> I[RETRIEVAL MODULE]\n```\n\nThis diagram illustrates the flow of data from the Retrieval module to the model, as well as its connections to other modules.\n\n**API Documentation**\n\nThe Retrieval module provides several APIs for accessing data and evaluating the model:\n\n1. **`getCorpusDimostrativo`**: returns the processed Corpus Dimostrativo data.\n2. **`parseCorpusNormattivaEsempio`**: parses the Akoma Ntoso Document format for use in the model.\n3. **`parseDocumentiNormattivaEsempio`**: parses documents from CLIB and returns them in a standardized format.\n\n**Troubleshooting**\n\nCommon issues with the Retrieval module include:\n\n1. **Data fetching errors**: ensure that data sources are properly configured and connected to the module.\n2. **Model inference errors**: check that the model is properly trained and configured for use with the module.\n3. **Data processing errors**: verify that data is being processed correctly, including tokenization, POS tagging, and NER.\n\nBy following this documentation, developers should be able to understand how the Retrieval module works, its key components, and how it connects to other modules in the codebase.","other-api":"# Other — api\n\n**API Module Documentation**\n\n**Overview**\n------------\n\nThe API module is a critical component of the Italian Oss Legal Platform, responsible for handling incoming requests from clients and providing access to various data sources. This documentation provides an in-depth overview of the API module's purpose, functionality, key components, and connections to other parts of the codebase.\n\n**Purpose**\n----------\n\nThe primary purpose of the API module is to provide a RESTful interface for clients to interact with the platform's data sources. It handles incoming requests, processes them, and returns responses in a standardized format.\n\n**How it Works**\n----------------\n\nThe API module uses the Express.js framework to create an HTTP server that listens on port 4000 (or the value of the `PORT` environment variable). When a client sends a request to the API, the server receives the request, processes it using various functions from the backend module, and returns a response in JSON format.\n\nThe API module uses several key components to achieve its functionality:\n\n*   **tokenOperatore**: A function that extracts the authentication token from incoming requests.\n*   **leggiStatoIngestDaEnv**: A function that retrieves the ingestion status from the environment variables.\n*   **salvaDocumentoUtente**: A function that saves a user's document.\n*   **listaDocumentiUtente**: A function that lists all documents for a user.\n*   **accodaReview**: A function that adds a review to the queue.\n*   **aggiornaReview**: A function that updates an existing review in the queue.\n\n**Key Components**\n------------------\n\n### Server\n\nThe server is the core component of the API module, responsible for handling incoming requests and returning responses. It uses Express.js to create an HTTP server that listens on port 4000 (or the value of the `PORT` environment variable).\n\n```mermaid\ngraph LR\n    A[Server] -->|listen|> B[Request]\n    B -->|parse|> C[Request Parser]\n    C -->|validate|> D[Validation]\n    D -->|process|> E[Request Processor]\n    E -->|return response|> F[Response Generator]\n    F -->|send response|> G[Client]\n```\n\n### Request Processor\n\nThe request processor is responsible for processing incoming requests using various functions from the backend module. It extracts the authentication token, retrieves the ingestion status, and calls the relevant functions to process the request.\n\n```mermaid\ngraph LR\n    A[Request Processor] -->|extract token|> B[Token Extractor]\n    B -->|retrieve ingestion status|> C[Ingestion Status Retrieval]\n    C -->|call salvaDocumentoUtente|> D[Salva Document Utente]\n    D -->|call listaDocumentiUtente|> E[List Documents Utente]\n    E -->|call accodaReview|> F[Accoda Review]\n    F -->|call aggiornaReview|> G[Aggiorna Review]\n```\n\n### Response Generator\n\nThe response generator is responsible for generating responses to incoming requests. It uses various functions from the backend module to retrieve data and returns it in JSON format.\n\n```mermaid\ngraph LR\n    A[Response Generator] -->|retrieve data|> B[Data Retrieval]\n    B -->|call leggiStatoIngestDaEnv|> C[Leggi Stato Ingest Da Env]\n    C -->|return response|> D[Response Generation]\n```\n\n**Connections to Other Parts of the Codebase**\n---------------------------------------------\n\nThe API module connects to other parts of the codebase through various functions and modules:\n\n*   **Backend Module**: The API module uses functions from the backend module to process incoming requests, retrieve data, and save user documents.\n*   **Worker Module**: The API module uses a function from the worker module to retrieve the ingestion status.\n\n**Error Handling**\n-----------------\n\nThe API module uses a global error handler to catch any errors that occur during request processing. It returns a standardized error response with a 500 status code.\n\n```mermaid\ngraph LR\n    A[Global Error Handler] -->|catch error|> B[Error Catcher]\n    B -->|return error response|> C[Error Response Generation]\n```\n\n**Conclusion**\n----------\n\nThe API module is a critical component of the Italian Oss Legal Platform, providing a RESTful interface for clients to interact with the platform's data sources. It uses various key components, including the server, request processor, and response generator, to achieve its functionality. The API module connects to other parts of the codebase through functions and modules, and uses error handling mechanisms to ensure robustness and reliability.","other-backend":"# Other — backend\n\n**Module Documentation: Backend API**\n\n**Overview**\n\nThe Backend API is a critical component of our application, responsible for handling incoming requests from various sources, processing data, and returning responses to clients. This module provides an overview of its purpose, functionality, key components, and connections to other parts of the codebase.\n\n**Purpose**\n\nThe primary goal of the Backend API is to provide a robust and scalable interface for interacting with our application's data storage systems, including documents, sources, reviews, and users. It handles incoming requests from various sources, such as web clients, mobile apps, and other services, and returns responses in a standardized format.\n\n**How it Works**\n\nThe Backend API consists of several key components:\n\n1. **Request Handling**: The API receives incoming requests from clients and routes them to the appropriate handler.\n2. **Data Processing**: The handlers process the data received from clients, which may involve querying databases, performing calculations, or generating responses.\n3. **Response Generation**: The processed data is then transformed into a response format suitable for return to clients.\n\n**Key Components**\n\n1. **Server**: The server is responsible for handling incoming requests and routing them to the appropriate handler.\n2. **Database**: The database stores and retrieves data for our application, including documents, sources, reviews, and users.\n3. **Handlers**: Handlers are functions that process incoming requests and return responses. Examples include `leggiDocumentoUtente`, `salvaDocumentoUtente`, and `aggiornaReview`.\n4. **API Endpoints**: API endpoints define the available routes for clients to interact with our application's data storage systems.\n\n**Connections to Other Parts of the Codebase**\n\nThe Backend API connects to other parts of the codebase through various interfaces:\n\n1. **Database Interface**: The API interacts with the database to store and retrieve data.\n2. **Handler Interface**: Handlers are responsible for processing incoming requests and returning responses.\n3. **Server Interface**: The server handles incoming requests and routes them to handlers.\n\n**Mermaid Diagram**\n\n```mermaid\ngraph LR\n    A[Client] -->|Request|> B[Server]\n    B -->|Route|> C[Handler 1]\n    C -->|Process Data|> D[Database]\n    D -->|Response|> E[Response Generator]\n    E -->|Transform Response|> F[API Endpoints]\n    F -->|Return Response|> G[Client]\n\n    A -->|Request|> H[Server]\n    H -->|Route|> I[Handler 2]\n    I -->|Process Data|> J[Database]\n    J -->|Response|> K[Response Generator]\n    K -->|Transform Response|> L[API Endpoints]\n    L -->|Return Response|> G[Client]\n\n    A -->|Request|> M[Server]\n    M -->|Route|> N[Handler 3]\n    N -->|Process Data|> O[Database]\n    O -->|Response|> P[Response Generator]\n    P -->|Transform Response|> Q[API Endpoints]\n    Q -->|Return Response|> G[Client]\n```\n\nThis diagram illustrates the flow of incoming requests from clients to the Backend API, highlighting the key components involved in processing and returning responses.\n\n**Conclusion**\n\nThe Backend API is a critical component of our application, responsible for handling incoming requests and returning responses. Its key components include request handling, data processing, response generation, and connections to other parts of the codebase through interfaces such as databases, handlers, and servers. By understanding how the Backend API works and its connections to other parts of the codebase, developers can build upon this foundation to create a robust and scalable application.","other-certs":"# Other — certs\n\n**Other - certs**\n\n## Overview\n\nThe `certs` module is responsible for managing local certificates and CAs (Certificate Authorities) necessary for HTTPS requests in outgoing traffic. This module provides a way to mount local CA files into the Docker runtime, allowing them to be used by Node.js applications.\n\n## Purpose\n\nThe primary purpose of this module is to provide a convenient way to use local certificates and CAs with Node.js applications running in Docker containers. By mounting local CA files into the Docker runtime, developers can avoid having to manage complex certificate chains or rely on external services for certificate management.\n\n## How it Works\n\nWhen a developer wants to use a local CA file with their Node.js application, they need to follow these steps:\n\n1. Export the trusted CA file (`local-ca.pem`) from the `certs` directory.\n2. Set the `NODE_EXTRA_CA_CERTS` environment variable to point to the location of the exported CA file (`/app/certs/local-ca.pem`).\n3. Recreate the Docker service that runs the Node.js application.\n\nThe `certs` module takes care of mounting the local CA file into the Docker runtime, allowing it to be used by the Node.js application.\n\n## Key Components\n\n* **Local CA Files**: The `certs` directory contains a single file (`local-ca.pem`) that represents the trusted CA.\n* **Environment Variable**: The `NODE_EXTRA_CA_CERTS` environment variable is set to point to the location of the local CA file.\n* **Docker Runtime**: The Docker runtime is configured to mount the local CA file into the container.\n\n## Connection to the Rest of the Codebase\n\nThe `certs` module connects to other parts of the codebase through the following interfaces:\n\n* **Node.js Application**: The Node.js application uses the mounted local CA file to establish secure connections.\n* **Docker Service**: The Docker service that runs the Node.js application is recreated after setting the environment variable.\n\n## Architecture Diagram\n\n```mermaid\ngraph LR\n    style certs filled, color #007bff;\n    style NodeJSApp filled, color #3498db;\n    style DockerService filled, color #2ecc71;\n\n    certs -->|mount local CA file|--> DockerRuntime\n    DockerRuntime -->|use mounted CA file|--> NodeJSApp\n\n    label certs as \"Local CA Files\"\n    label NodeJSApp as \"Node.js Application\"\n    label DockerService as \"Docker Service\"\n\n    style NodeJSApp\n        color #3498db;\n    style DockerService\n        color #2ecc71;\n```\n\nThis diagram shows the `certs` module mounting a local CA file into the Docker runtime, which is then used by the Node.js application.","other-compose-yml":"# Other — compose.yml\n\n**Other - compose.yml**\n========================\n\nTable of Contents\n-----------------\n\n1. [Overview](#overview)\n2. [Purpose](#purpose)\n3. [How it Works](#how-it-works)\n4. [Key Components](#key-components)\n5. [Connections to the Rest of the Codebase](#connections-to-the-rest-of-the-codebase)\n\n### Overview\n\nThe `compose.yml` module is responsible for defining and managing the services that make up the Italian OSS Legal Platform application. It orchestrates the deployment, configuration, and interaction between various components, including the API, app, worker, and minio services.\n\n### Purpose\n\nThe primary purpose of this module is to provide a unified way of managing the dependencies and interactions between different services in the application. By defining the services and their relationships in a single file, it simplifies the process of deploying and maintaining the application.\n\n### How it Works\n\nThe `compose.yml` module uses Docker Compose to define and manage the services. Here's a high-level overview of how it works:\n\n1. **Service Definition**: The module defines each service (e.g., API, app, worker, minio) using a YAML file that specifies its image, ports, environment variables, and other configuration settings.\n2. **Dependency Management**: The module manages the dependencies between services by specifying which services depend on others. For example, the `app` service depends on the `api` service to function correctly.\n3. **Service Start-up**: When the application is started, Docker Compose starts each service according to its definition in the `compose.yml` file.\n4. **Health Checks**: The module defines health checks for each service to ensure they are running correctly.\n\n### Key Components\n\nThe following services are defined in this module:\n\n*   **API Service**: Handles incoming requests and provides data to the app service.\n*   **App Service**: Provides a user interface for the application and interacts with the API service.\n*   **Worker Service**: Responsible for ingesting data from the database and performing other tasks.\n*   **Minio Service**: Provides object storage for the application.\n\n### Connections to the Rest of the Codebase\n\nThe `compose.yml` module connects to the rest of the codebase through the following relationships:\n\n*   The `app` service depends on the `api` service, which means it will only start if the API is healthy.\n*   The `worker` service depends on the `postgres` service, which means it will only start if the database is healthy.\n*   The `minio-init` service depends on the `minio` service, which means it will only start if the minio service is healthy.\n\n**Service Relationships Diagram**\n```mermaid\ngraph LR\n    style app fill:#f9f,stroke:#333,stroke-width:3px;\n    style api fill:#f9f,stroke:#333,stroke-width:3px;\n    style worker fill:#f9f,stroke:#333,stroke-width:3px;\n    style minio fill:#f9f,stroke:#333,stroke-width:3px;\n    style postgres fill:#f9f,stroke:#333,stroke-width:3px;\n\n    api --> app\n    app --> worker\n    worker --> postgres\n    minio --> minio-init\n\n    label \"Depends on\" as \"Depends On\"\n    label \"Health Check\" as \"Health Check\"\n\n    style dependsOn fill:#ccc,stroke:#333,stroke-width:3px;\n    style healthCheck fill:#ccc,stroke:#333,stroke-width:3px;\n\n    api[dependsOn] --> app[healthCheck]\n    app[dependsOn] --> worker[healthCheck]\n    worker[dependsOn] --> postgres[healthCheck]\n    minio-init[dependsOn] --> minio[healthCheck]\n\n    label \"Service Start-up\" as \"Starts Up\"\n    style startsUp fill:#ccc,stroke:#333,stroke-width:3px;\n\n    api[startsUp]\n    app[startsUp]\n    worker[startsUp]\n    minio-init[startsUp]\n    minio[startsUp]\n    postgres[startsUp]\n\n    label \"Health Check Interval\" as \"Interval\"\n    style interval fill:#ccc,stroke:#333,stroke-width:3px;\n\n    api[interval] --> app[interval]\n    app[interval] --> worker[interval]\n    worker[interval] --> postgres[interval]\n    minio-init[interval] --> minio[interval]\n\n    label \"Timeout\" as \"Timeout\"\n    style timeout fill:#ccc,stroke:#333,stroke-width:3px;\n\n    api[timeout] --> app[timeout]\n    app[timeout] --> worker[timeout]\n    worker[timeout] --> postgres[timeout]\n    minio-init[timeout] --> minio[timeout]\n\n    label \"Retries\" as \"Retries\"\n    style retries fill:#ccc,stroke:#333,stroke-width:3px;\n\n    api[retries] --> app[retries]\n    app[retries] --> worker[retries]\n    worker[retries] --> postgres[retries]\n    minio-init[retries] --> minio[retries]\n\n```\nThis diagram illustrates the relationships between services, including dependencies, health checks, and start-up behavior.","other-corpora":"# Other — corpora\n\n**Module Documentation: `datafetcher`**\n\n**Overview**\n\nThe `datafetcher` module is responsible for fetching data from various sources, including databases, APIs, and files. It provides a unified interface for accessing data, allowing different parts of the codebase to retrieve specific information without having to worry about the underlying data storage or retrieval mechanisms.\n\n**Purpose**\n\nThe primary purpose of the `datafetcher` module is to provide a flexible and scalable way to fetch data from various sources. This allows developers to focus on writing application logic rather than worrying about how to access data.\n\n**How it Works**\n\nThe `datafetcher` module uses a combination of techniques to fetch data, including:\n\n1. **Database connections**: The module establishes connections to databases using established libraries and frameworks.\n2. **API calls**: The module makes API calls to external services using HTTP requests.\n3. **File reading**: The module reads data from files using standard file I/O operations.\n\nThe `datafetcher` module uses a modular design, where each data source is represented by a separate class or function. These classes and functions are responsible for fetching specific types of data.\n\n**Key Components**\n\n1. **Data Source Classes**: Each data source is represented by a separate class or function, which encapsulates the logic for fetching data from that particular source.\n2. **Data Fetcher Interface**: The `datafetcher` module provides an interface for accessing data, allowing developers to retrieve specific information without having to worry about the underlying data storage or retrieval mechanisms.\n3. **Cache Mechanism**: The module uses a cache mechanism to store frequently accessed data, reducing the number of requests made to external sources.\n\n**Connections to the Rest of the Codebase**\n\nThe `datafetcher` module connects to other parts of the codebase through the following interfaces:\n\n1. **API Gateway**: The `datafetcher` module is integrated with an API gateway, which provides a unified interface for accessing data from various sources.\n2. **Application Logic**: The `datafetcher` module is used by application logic to retrieve specific information, allowing developers to focus on writing application code rather than worrying about data access.\n\n**Mermaid Diagram**\n\n```mermaid\ngraph LR\n    A[Data Fetcher] -->|API Gateway|> B[API Calls]\n    A -->|Database Connections|> C[Database Queries]\n    A -->|File Reading|> D[File I/O]\n    B -->|External Services|> E[Data Sources]\n    C -->|Database Schema|> F[Database Schema]\n    D -->|File System|> G[File System]\n```\n\nThis Mermaid diagram illustrates the connections between the `datafetcher` module and other parts of the codebase, highlighting the different data sources and interfaces used by the module.\n\n**Execution Flows**\n\nThe `datafetcher` module uses a combination of techniques to execute data retrieval requests, including:\n\n1. **Cache Mechanism**: The module checks the cache before making a request to an external source.\n2. **Database Queries**: The module executes database queries using established libraries and frameworks.\n3. **API Calls**: The module makes API calls to external services using HTTP requests.\n\nThe `datafetcher` module uses a modular design, where each data source is represented by a separate class or function. These classes and functions are responsible for fetching specific types of data.\n\n**Conclusion**\n\nIn conclusion, the `datafetcher` module provides a flexible and scalable way to fetch data from various sources. Its modular design and cache mechanism make it an essential component of the codebase, allowing developers to focus on writing application logic rather than worrying about data access.","other-database":"# Other — database\n\n**Database Module Documentation**\n\n**Overview**\n------------\n\nThe Database module is responsible for managing the migration of data from various sources to the platform's database. It provides a set of SQL migrations that can be applied to create or modify the database schema, as well as manage ingest jobs, source catalogs, and review queues.\n\n**Purpose**\n----------\n\nThe primary purpose of this module is to provide a standardized way of migrating data into the platform's database, ensuring consistency and accuracy across all data sources. It also enables the management of ingest jobs, source catalogs, and review queues, which are essential for the platform's functionality.\n\n**How it Works**\n----------------\n\nThe Database module uses a set of SQL migrations to create or modify the database schema. These migrations are applied using the `npm run worker:migrate` command. The module also manages ingest jobs, source catalogs, and review queues, which are used to process incoming data from various sources.\n\nHere is a high-level overview of the workflow:\n\n1. **Migration**: The Database module applies SQL migrations to create or modify the database schema.\n2. **Ingest Job Management**: The module manages ingest jobs, which are responsible for processing incoming data from various sources.\n3. **Source Catalog Management**: The module manages source catalogs, which define the structure and metadata of the data being ingested.\n4. **Review Queue Management**: The module manages review queues, which are used to process incoming data that requires human review.\n\n**Key Components**\n-----------------\n\nThe Database module consists of several key components:\n\n*   **SQL Migrations**: A set of SQL migrations that create or modify the database schema.\n*   **Ingest Jobs**: Responsible for processing incoming data from various sources.\n*   **Source Catalogs**: Define the structure and metadata of the data being ingested.\n*   **Review Queues**: Used to process incoming data that requires human review.\n\n**Connection to Rest of Codebase**\n---------------------------------\n\nThe Database module connects to the rest of the codebase through several interfaces:\n\n*   **Ingest Interface**: The module interacts with the Ingest interface to receive incoming data from various sources.\n*   **Source Catalog Interface**: The module interacts with the Source Catalog interface to manage source catalogs and retrieve metadata.\n*   **Review Queue Interface**: The module interacts with the Review Queue interface to manage review queues and process incoming data.\n\n**Mermaid Diagram**\n------------------\n\nHere is a Mermaid diagram that illustrates the architecture of the Database module:\n```mermaid\ngraph LR\n    A[Ingest Interface] -->|data|> B[Database Module]\n    B -->|schema|> C[SQL Migrations]\n    B -->|ingest jobs|> D[Ingest Job Manager]\n    B -->|source catalogs|> E[Source Catalog Manager]\n    B -->|review queues|> F[Review Queue Manager]\n    C -->|migrations|> G[Database Schema]\n    D -->|job data|> H[Job Data Store]\n    E -->|metadata|> I[Metadata Store]\n    F -->|queue data|> J[Queue Data Store]\n```\nThis diagram shows the relationships between the Ingest interface, the Database module, and its key components. It illustrates how the module interacts with the SQL migrations, ingest jobs, source catalogs, and review queues to manage the database schema and process incoming data.\n\n**API Documentation**\n--------------------\n\nThe Database module provides several APIs that can be used to interact with its functionality:\n\n*   **`npm run worker:migrate`**: Applies SQL migrations to create or modify the database schema.\n*   **`Ingest Interface`**: Provides an interface for receiving incoming data from various sources.\n*   **`Source Catalog Interface`**: Provides an interface for managing source catalogs and retrieving metadata.\n*   **`Review Queue Interface`**: Provides an interface for managing review queues and processing incoming data.\n\n**Troubleshooting**\n------------------\n\nThe Database module provides several troubleshooting tools to help diagnose issues:\n\n*   **SQL Error Log**: Logs SQL errors that occur during migration or data processing.\n*   **Ingest Job Log**: Logs ingest job data, including job status and error messages.\n*   **Source Catalog Log**: Logs source catalog metadata, including schema and data changes.\n\n**Best Practices**\n------------------\n\nThe Database module follows several best practices to ensure high-quality data processing:\n\n*   **Data Validation**: Validates incoming data against a set of predefined rules and schema.\n*   **Error Handling**: Handles errors that occur during data processing, including logging and notification mechanisms.\n*   **Schema Management**: Manages the database schema to ensure consistency and accuracy across all data sources.","other-decisions":"# Other — decisions\n\n**Other — decisions**\n\n## Overview\nThe `decisions` module is responsible for defining and managing the project's baseline stack, which includes choices on technologies, databases, and infrastructure. This document provides an overview of the module's purpose, how it works, its key components, and how it connects to the rest of the codebase.\n\n### Purpose\n\nThe primary goal of this module is to provide a solid foundation for the project by selecting a set of technologies that can support ingest of legal sources, vector search, orchestration of RAG (Research and Analysis Group) tasks, and distribution with autonomous hosting. The baseline stack should be flexible enough to accommodate changes without requiring significant rework.\n\n### How it Works\n\nThe `decisions` module uses a simple decision-making process:\n\n1. Define the project's requirements and constraints.\n2. Evaluate existing technologies and choose the best fit for each component (e.g., frontend, API, database).\n3. Document the chosen baseline stack and its implications.\n\n## Key Components\n\n### Frontend\n\n* **Next.js**: Used for the interface, providing a robust and scalable foundation for the frontend.\n* **TypeScript**: Utilized as the primary programming language for the frontend, ensuring maintainability and scalability.\n\n### API and Services\n\n* **Node.js**: Employed as the runtime environment for the API and services, leveraging its performance and flexibility.\n* **TypeScript**: Also used for the API and services, maintaining consistency with the frontend.\n\n### Database\n\n* **PostgreSQL**: Chosen as the primary database, providing a robust and scalable solution for structured data storage and vector search.\n* **pgvector**: Utilized to enhance search capabilities and improve query performance.\n\n### Storage\n\n* **MinIO** (or compatible S3 service): Selected as the object storage solution, offering high-performance and scalability.\n\n### Infrastructure\n\n* **Docker Compose**: Used to manage local development environments with autonomous hosting, ensuring flexibility and portability.\n\n### Embedding and LLM Integration\n\n* **Interfacce sostituibili**: Designed to accommodate interchangeable interfaces for third-party LLM (Large Language Model) services and embedding libraries.\n\n## Connection to the Codebase\n\nThe `decisions` module connects to other parts of the codebase through:\n\n* **API routes**: The API and services components interact with the frontend, using Next.js as the interface.\n* **Database queries**: The database component is used by various parts of the application, including the API and services.\n\n## Call Graph & Execution Flows\n\nThe `decisions` module has no outgoing or incoming calls. Its execution flows are not explicitly defined, as it primarily serves as a configuration file for the baseline stack.\n\n```mermaid\ngraph LR\n    style decision-making process fill:#f9f,stroke:#333,stroke-width:2px;\n    decision-making process -->|Define project requirements|-->|Evaluate technologies|\n    decision-making process -->|Choose best fit|-->|Document baseline stack|\n    \n    style Next.js fill:#f9f,stroke:#333,stroke-width:2px;\n    Next.js -->|Interface|-->|Frontend API|\n    style Node.js fill:#f9f,stroke:#333,stroke-width:2px;\n    Node.js -->|API and services|-->|Database queries|\n    \n    style PostgreSQL fill:#f9f,stroke:#333,stroke-width:2px;\n    PostgreSQL -->|Structured data storage|-->|Vector search|\n    style MinIO fill:#f9f,stroke:#333,stroke-width:2px;\n    MinIO -->|Object storage|-->|Autonomous hosting|\n```\n\nThis Mermaid diagram illustrates the high-level connections between the `decisions` module and other components in the codebase.","other-dockerfile":"# Other — Dockerfile\n\n**Other — Dockerfile**\n=====================\n\n## Overview\n\nThe `Dockerfile` is a crucial component in building and deploying the Italian Oss Legal Platform (IOLP) application. This module provides instructions for creating a Docker image that contains all the necessary dependencies and code for the platform.\n\n## Purpose\n\nThe primary purpose of this module is to automate the process of building and deploying the IOLP application using Docker. By leveraging the `Dockerfile`, developers can ensure consistency across different environments, simplify deployment, and reduce the risk of errors.\n\n## How it Works\n\nHere's a step-by-step explanation of how the `Dockerfile` works:\n\n1. **Base Image**: The `Dockerfile` starts by using the official Node.js 20.11.1-bookworm-slim image as the base.\n2. **Environment Variables**: The module sets environment variables, including `NEXT_TELEMETRY_DISABLED=1`, to disable telemetry features in the application.\n3. **Argument**: An argument is set for `NPM_CONFIG_STRICT_SSL` to ensure strict SSL configuration during npm operations.\n4. **Copy Dependencies**: The module copies necessary package files (e.g., `package.json`, `tsconfig.base.json`) from various directories into the container.\n5. **Install Dependencies**: The `RUN` command installs dependencies using `npm ci --include=dev --no-audit --no-fund`.\n6. **Build Application**: The `COPY . .` instruction copies the application code into the container, and the `RUN npm run build` command builds the application.\n7. **Expose Ports**: The module exposes ports 3000 and 4000 for external access.\n8. **Command**: The final `CMD` instruction sets the default command to start the application using `npm`.\n\n## Key Components\n\n* **Base Image**: Official Node.js 20.11.1-bookworm-slim image\n* **Environment Variables**: `NEXT_TELEMETRY_DISABLED=1`, `NPM_CONFIG_STRICT_SSL=true`\n* **Dependencies**: Various packages (e.g., `@italian-oss-legal-platform/web`, `npm`)\n* **Application Code**: Copied from various directories\n\n## Connection to the Rest of the Codebase\n\nThe `Dockerfile` is closely tied to other modules in the codebase, particularly:\n\n* **`package.json` and `tsconfig.base.json`**: These files contain dependencies and build configurations for the application.\n* **`npm run build`**: This command builds the application using the specified configuration.\n\n## Mermaid Diagram: Docker Image Layers\n\n```mermaid\ngraph LR\n    A[Base Image] -->|extends| B(Node.js 20.11.1-bookworm-slim)\n    B -->|copy| C(Environment Variables)\n    C -->|set| D(NPM_CONFIG_STRICT_SSL=true)\n    E[Copy Dependencies] -->|copy| F(package.json, tsconfig.base.json)\n    G[Install Dependencies] -->|npm ci| H(dependencies installed)\n    I[COPY . .] -->|build application| J(application built)\n    K[Expose Ports] -->|expose| L(ports 3000 and 4000)\n    M[Command] -->|start application| N(start command executed)\n```\n\nThis Mermaid diagram illustrates the flow of instructions in the `Dockerfile`, from setting environment variables to building the application.","other-docs":"# Other — docs\n\n**Ingestion Module Documentation**\n\n**Overview**\n\nThe Ingestion Module is responsible for collecting, processing, and storing data from various sources to build the corpus of Normative Acts (NA). It plays a crucial role in ensuring the accuracy, completeness, and consistency of the NA dataset.\n\n**Purpose**\n\nThe primary purpose of the Ingestion Module is to:\n\n1. Collect data from external sources, such as Open Data Normativa, Gazzetta Ufficiale, and other relevant datasets.\n2. Process the collected data using various algorithms and techniques to extract relevant information.\n3. Store the processed data in a database for further analysis and use.\n\n**How it Works**\n\nThe Ingestion Module works by:\n\n1. Receiving requests from the Application Layer to ingest new data.\n2. Querying external sources, such as Open Data Normativa, to retrieve relevant data.\n3. Processing the retrieved data using various algorithms and techniques, such as text normalization, entity recognition, and relationship extraction.\n4. Storing the processed data in a database for further analysis and use.\n\n**Key Components**\n\nThe Ingestion Module consists of the following key components:\n\n1. **Data Sources**: The module connects to external sources, such as Open Data Normativa, Gazzetta Ufficiale, and other relevant datasets.\n2. **Data Processing**: The module uses various algorithms and techniques to process the collected data, including text normalization, entity recognition, and relationship extraction.\n3. **Database**: The module stores the processed data in a database for further analysis and use.\n4. **Review Queue**: The module allows users to review and validate the ingested data, ensuring its accuracy and completeness.\n\n**Architecture**\n\nThe Ingestion Module architecture is as follows:\n\n```\n+---------------+\n|  Application  |\n|  Layer        |\n+---------------+\n          |\n          | Request\n          v\n+---------------+\n|  Ingestion    |\n|  Module       |\n+---------------+\n          |\n          | Data Sources\n          v\n+---------------+\n|  Data Processing|\n+---------------+\n          |\n          | Database\n          v\n+---------------+\n|  Storage      |\n+---------------+\n```\n\n**Mermaid Diagram**\n\nThe following Mermaid diagram illustrates the Ingestion Module architecture:\n```mermaid\ngraph LR\n    Application Layer --> Ingestion Module\n    Ingestion Module --> Data Sources\n    Ingestion Module --> Data Processing\n    Data Processing --> Database\n    Database --> Storage\n```\nThis diagram shows the flow of data from the Application Layer to the Ingestion Module, which then processes and stores the data in a database.\n\n**Connections to Other Modules**\n\nThe Ingestion Module connects to other modules in the codebase as follows:\n\n1. **Application Layer**: The module receives requests from the Application Layer to ingest new data.\n2. **Data Sources**: The module connects to external sources, such as Open Data Normativa, to retrieve relevant data.\n3. **Review Queue**: The module allows users to review and validate the ingested data, ensuring its accuracy and completeness.\n\n**Conclusion**\n\nThe Ingestion Module is a critical component of the corpus building process, responsible for collecting, processing, and storing data from various sources. Its architecture and connections to other modules ensure that the data is accurate, complete, and consistent, making it suitable for use in various applications.","other-domain":"# Other — domain\n\n**Domain Module Documentation**\n\n**Overview**\n-----------\n\nThe Domain module is a critical component of the Italian Oss Legal Platform, responsible for managing citation metadata and providing functionality to validate, create chunks, and determine version active dates.\n\n**Purpose**\n---------\n\nThe primary purpose of this module is to provide a standardized way of handling citation metadata, ensuring consistency across the platform. It also enables the creation of chunks and validation of metadata, which are essential for the overall functioning of the platform.\n\n**Key Components**\n-----------------\n\n### CitationMetadataError\n\n*   **Description:** An error class representing invalid or missing citation metadata.\n*   **Properties:**\n\n    *   `valid`: A boolean indicating whether the metadata is valid.\n    *   `missingFields`: An array of missing fields in the metadata.\n\n### createChunk\n\n*   **Description:** Creates a chunk based on the provided metadata and unit ID.\n*   **Parameters:**\n    *   `id`: The unique identifier for the chunk.\n    *   `unitaId`: The ID of the unit associated with the chunk.\n    *   `testo`: The text content of the chunk.\n    *   `metadati`: An object containing citation metadata.\n\n### createCitationLabel\n\n*   **Description:** Generates a citation label based on the provided metadata.\n*   **Parameters:**\n    *   `citation`: An object containing citation metadata.\n\n### isVersionActiveAt\n\n*   **Description:** Determines whether a date falls within an active version interval.\n*   **Parameters:**\n    *   `versione`: An object representing a version with its start and end dates, as well as the ID of the norma ELI.\n    *   `data`: The date to check.\n\n**How it Works**\n----------------\n\nThe Domain module is designed to be modular and reusable. It exports several functions that can be used throughout the platform:\n\n*   `createChunk`: Creates a chunk based on the provided metadata and unit ID.\n*   `createCitationLabel`: Generates a citation label from the metadata.\n*   `isVersionActiveAt`: Determines whether a date falls within an active version interval.\n\nThese functions are designed to work together seamlessly, ensuring that citation metadata is consistently validated and processed throughout the platform.\n\n**Connection to the Rest of the Codebase**\n-----------------------------------------\n\nThe Domain module connects to other parts of the codebase through various means:\n\n*   **Internal Calls:** The `createCitationLabel` function calls `domain/src/index.ts`, which in turn uses functions from this module.\n*   **Outgoing Calls:** This module exports several functions that can be used by other parts of the platform, such as `domain/test/domain.test.mjs`.\n\n**Call Graph & Execution Flows**\n------------------------------\n\n```mermaid\ngraph LR\n    A[domain/src/index.ts] -->|createChunk|> B[domain/src/index.ts]\n    A[domain/src/index.ts] -->|createCitationLabel|> C[domain/test/domain.test.mjs]\n    A[domain/src/index.ts] -->|validateCitationMetadata|> D[domain/test/domain.test.mjs]\n    A[domain/src/index.ts] -->|isVersionActiveAt|> E[domain/test/domain.test.mjs]\n```\n\nThis call graph illustrates the internal calls made by `createCitationLabel` and the outgoing calls to this module from other parts of the platform.\n\n**Execution Flows**\n------------------\n\nNo execution flows are detected for this module, as it is designed to be a self-contained component with minimal dependencies.","other-evaluation":"# Other — evaluation\n\n**Other - Evaluation Module Documentation**\n\n**Overview**\n------------\n\nThe Other - Evaluation module is responsible for evaluating the quality of the corpus base, specifically in terms of precision, recall, and F1 score. It provides a way to assess the performance of the retrieval system and identify areas for improvement.\n\n**Purpose**\n----------\n\nThe primary purpose of this module is to provide a standardized evaluation framework for the retrieval system. It ensures that the system's performance is measured consistently and accurately, allowing for informed decisions about future development and optimization.\n\n**How it Works**\n----------------\n\nThe evaluation process involves the following steps:\n\n1.  **Data Preparation**: The corpus base is prepared for evaluation by extracting relevant information such as article IDs, titles, and content.\n2.  **Evaluation Metrics**: The module calculates various evaluation metrics, including precision, recall, F1 score, and others, to assess the system's performance.\n3.  **Result Reporting**: The results are reported in a standardized format, providing insights into the system's strengths and weaknesses.\n\n**Key Components**\n------------------\n\n*   **`valutaCasi()` Function**: This is the main function responsible for evaluating the corpus base. It takes no arguments and returns an object containing the evaluation metrics.\n*   **`evaluation/test/evaluation.test.ts` File**: This file contains test cases that verify the correctness of the `valutaCasi()` function.\n\n**Connection to the Rest of the Codebase**\n-----------------------------------------\n\nThe Other - Evaluation module is designed to work seamlessly with other modules in the codebase. Specifically:\n\n*   **Retrieval Module**: The evaluation module relies on the retrieval module's output, which provides the corpus base for evaluation.\n*   **Test Framework**: The test framework is used to verify the correctness of the `valutaCasi()` function.\n\n**Call Graph & Execution Flows**\n-
