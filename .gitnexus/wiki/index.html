------------------------------\n\n```mermaid\ngraph LR\n    A[Retrieval Module] -->|output|> B[Evaluation Module]\n    B -->|input|> C[Test Framework]\n```\n\nThis Mermaid diagram illustrates the call graph and execution flows for this module. The retrieval module provides output to the evaluation module, which then passes input to the test framework.\n\n**Configuration**\n-----------------\n\nThe module's configuration is managed through the `tsconfig.build.json` and `tsconfig.json` files. These files specify the compiler options, including the types and include paths.\n\n**Scripts**\n------------\n\nThe module includes several scripts:\n\n*   **`build`**: Compiles the code using the `tsc` command.\n*   **`test`**: Runs the test cases using the `tsx` command.\n*   **`typecheck`**: Performs type checking on the code using the `tsc` command.\n\n**Dependencies**\n----------------\n\nThe module depends on the retrieval module, which is specified in the `package.json` file.","other-ingest":"# Other — ingest\n\n**Ingest Module Documentation**\n\n**Overview**\n------------\n\nThe Ingest module is responsible for processing and transforming raw data into a standardized format, which can be used by various components of the Italian OSS Legal Platform. Its primary purpose is to ingest and normalize data from external sources, such as XML files or text documents.\n\n**How it Works**\n-----------------\n\nThe Ingest module consists of several key components:\n\n1.  **Data Processing**: The module uses a combination of natural language processing (NLP) techniques and machine learning algorithms to process the raw data.\n2.  **Data Normalization**: The processed data is then normalized using a set of predefined rules and transformations, which ensure that the data conforms to the standardized format required by the platform.\n3.  **Data Storage**: The normalized data is stored in a database or file system, depending on the configuration.\n\n**Key Components**\n------------------\n\n### `parseCorpusNormattivaEsempio`\n\nThis function takes an XML file as input and extracts relevant information, such as law numbers, dates, and text content. It returns an object containing this information, which is then used for further processing.\n\n### `creaManifestoIngest`\n\nThis function creates a manifest (or metadata) for the ingested data, which includes information about the data's format, structure, and other relevant details.\n\n### `archiviaFontiCorpus`\n\nThis function archives the original XML files to a storage system, such as Amazon S3 or a local file system. It returns an array of archived objects, each containing metadata about the corresponding XML file.\n\n**Connection to Other Components**\n---------------------------------\n\nThe Ingest module connects to other components in the following ways:\n\n*   **Data Retrieval**: The module retrieves data from external sources, such as XML files or text documents.\n*   **Data Storage**: The module stores processed and normalized data in a database or file system.\n*   **Data Processing**: The module uses NLP techniques and machine learning algorithms to process raw data.\n\n**Call Graph**\n--------------\n\nThe following Mermaid diagram illustrates the call graph for the Ingest module:\n\n```mermaid\ngraph LR\n    A[main] --> B[parseCorpusNormattivaEsempio]\n    B --> C[creaManifestoIngest]\n    B --> D[archiviaFontiCorpus]\n    E[ingest.test.ts] --> F[parseCorpusNormattivaEsempio]\n    F --> G[creaManifestoIngest]\n    F --> H[archiviaFontiCorpus]\n```\n\nThis diagram shows the main function (`main`) calling `parseCorpusNormattivaEsempio`, which in turn calls `creaManifestoIngest` and `archiviaFontiCorpus`. The test module also calls these functions, but with different inputs.\n\n**Execution Flows**\n------------------\n\nThe Ingest module participates in several execution flows:\n\n*   **Main → AsRecord**: This flow involves the main function calling `parseCorpusNormattivaEsempio`, which returns an object containing processed data. The main function then calls `creaManifestoIngest` to create a manifest for the ingested data.\n*   **Main → ReadAttribute**: This flow involves the main function calling `parseCorpusNormattivaEsempio`, which extracts relevant information from the XML file. The main function then calls `archiviaFontiCorpus` to archive the original XML files.\n*   **Main → Sha256**: This flow involves the main function calling `archiviaFontiCorpus`, which archives the original XML files and returns an array of archived objects. The main function then calls `salvaArtefatto` to save the archived objects.\n\n**Conclusion**\n----------\n\nThe Ingest module is a critical component of the Italian OSS Legal Platform, responsible for processing and transforming raw data into a standardized format. Its key components, such as `parseCorpusNormattivaEsempio`, `creaManifestoIngest`, and `archiviaFontiCorpus`, work together to ensure that data is accurately processed and stored. The module's connection to other components in the platform ensures seamless data retrieval, storage, and processing.","other-llm":"# Other — llm\n\n**LLM (Large Language Model) Module Documentation**\n\n**Overview**\n------------\n\nThe LLM module is designed to provide a flexible and scalable way to interact with large language models, such as OpenAI's GPT-5.5. This module allows developers to easily integrate these models into their applications, leveraging the power of natural language processing (NLP) for tasks like text generation, sentiment analysis, and more.\n\n**Key Components**\n-----------------\n\n### 1. **EmbeddingProvider**\n\nThe EmbeddingProvider is responsible for generating embeddings from input text. It uses OpenAI's embedding model to produce a dense vector representation of the input text.\n\n*   **Methods:**\n    *   `generaEmbedding(text)`: Generates an embedding for the given input text.\n*   **Configuration Options:**\n    *   `apiKey`: The API key for OpenAI's embedding model.\n    *   `baseUrl`: The base URL for OpenAI's API.\n    *   `model`: The name of the OpenAI embedding model to use.\n\n### 2. **GeneratoreRisposta**\n\nThe GeneratoreRisposta is responsible for generating responses based on input text and a set of predefined sources. It uses an OpenAI-compatible response model to produce a human-readable response.\n\n*   **Methods:**\n    *   `genera(query)`: Generates a response for the given input query.\n*   **Configuration Options:**\n    *   `apiKey`: The API key for OpenAI's response model.\n    *   `baseUrl`: The base URL for OpenAI's API.\n    *   `model`: The name of the OpenAI response model to use.\n\n### 3. **similaritaCoseno**\n\nThe similaritaCoseno function calculates the cosine similarity between two vectors.\n\n*   **Method:**\n    *   `similaritaCoseno(vector1, vector2)`: Calculates the cosine similarity between two input vectors.\n*   **Configuration Options:** None\n\n### 4. **creaGeneratoreRispostaDaEnv**\n\nThe creaGeneratoreRispostaDaEnv function creates a GeneratoreRisposta instance from environment variables.\n\n*   **Method:**\n    *   `creaGeneratoreRispostaDaEnv(config)`: Creates a GeneratoreRisposta instance based on the provided configuration options.\n*   **Configuration Options:**\n    *   `LLM_PROVIDER`: The name of the LLM provider to use (e.g., \"openai\").\n    *   `OPENAI_API_KEY`: The API key for OpenAI's response model.\n    *   `OPENAI_BASE_URL`: The base URL for OpenAI's API.\n    *   `OPENAI_RESPONSE_MODEL`: The name of the OpenAI response model to use.\n\n### 5. **creaEmbeddingProviderDaEnv**\n\nThe creaEmbeddingProviderDaEnv function creates an EmbeddingProvider instance from environment variables.\n\n*   **Method:**\n    *   `creaEmbeddingProviderDaEnv(config)`: Creates an EmbeddingProvider instance based on the provided configuration options.\n*   **Configuration Options:**\n    *   `EMBEDDING_PROVIDER`: The name of the LLM provider to use (e.g., \"openai\").\n    *   `OPENAI_API_KEY`: The API key for OpenAI's embedding model.\n    *   `OPENAI_BASE_URL`: The base URL for OpenAI's API.\n    *   `OPENAI_EMBEDDING_MODEL`: The name of the OpenAI embedding model to use.\n\n**Connection to the Rest of the Codebase**\n-----------------------------------------\n\nThe LLM module connects to the rest of the codebase through the following interfaces:\n\n*   **llm.test.ts**: This test file provides a set of tests for the LLM module, including tests for generating embeddings and responses.\n*   **src/index.ts**: This is the main entry point for the LLM module, which imports and instantiates the various components mentioned above.\n\n**Call Graph & Execution Flows**\n---------------------------------\n\nThe following Mermaid diagram illustrates the call graph and execution flows for the LLM module:\n\n```mermaid\ngraph LR\n    A[llm.test.ts] -->|generaEmbedding|> B[OpenAICompatibleEmbeddingProvider]\n    A[llm.test.ts] -->|genera|> C[GeneratoreRispostaStub]\n    A[llm.test.ts] -->|similaritaCoseno|> D[similaritaCoseno]\n    A[llm.test.ts] -->|genera|> E[OpenAICompatibleGeneratoreRisposta]\n    A[llm.test.ts] -->|creaGeneratoreRispostaDaEnv|> F[creaGeneratoreRispostaDaEnv]\n    A[llm.test.ts] -->|creaEmbeddingProviderDaEnv|> G[creaEmbeddingProviderDaEnv]\n```\n\nThis diagram shows the various components and their relationships, as well as the execution flows for generating embeddings and responses.\n\n**Conclusion**\n----------\n\nThe LLM module provides a flexible and scalable way to interact with large language models. By understanding its key components and connection to the rest of the codebase, developers can effectively use this module in their applications.","other-okf":"# Other — okf\n\n# Italian-OSS-Legal-Platform - OKF Bundle\n=====================================\n\n## Overview\n\nThe Italian-OSS-Legal-Platform is an open-source project that aims to provide a comprehensive platform for legal data management, sharing, and analysis. The Open Knowledge Format (OKF) bundle is a crucial component of this project, serving as a knowledge base that contains fonti dati, modello dati, architettura, policy operative, and glossario del progetto.\n\n## Purpose\n\nThe OKF bundle provides a standardized framework for managing legal data, ensuring its accuracy, consistency, and accessibility. It serves as a repository for various types of data, including normative sources, data models, architectures, policies, and glossaries.\n\n## How it Works\n\nThe OKF bundle is structured as a directory of Markdown files with frontmatter YAML headers. Each file represents a single concept or entity, such as a fonte dati, an entità dati, or a termine giuridico. The bundle uses a hierarchical structure, with each file linked to others through relative paths.\n\nThe bundle also includes an `index.md` file in each cartella (directory) that describes and indexes the concepts contained within. Additionally, the bundle enables policy tracciabili (traceable policies), which require external sources to provide perimetro, attribuzione, and evidenza URL.\n\n## Key Components\n\n### Fonti dei dati\n\nThe fonti dei dati directory contains normative sources, formats, and conditions of reuse. These sources are essential for ensuring the accuracy and consistency of legal data.\n\n### Modello dati\n\nThe modello dati directory contains various data models, including FRBR, ELI, Akoma Ntoso, and more. These models provide a standardized structure for managing legal data.\n\n### Architettura\n\nThe architettura directory describes the components of the system and the RAG (Rete di Aggiornamento e Gestione) flow. This section is crucial for understanding how the OKF bundle integrates with other components of the platform.\n\n### Glossario\n\nThe glossario directory contains a list of terms, including giuridici and tecnici. These terms are essential for ensuring clarity and consistency in legal data management.\n\n## Connection to the Rest of the Codebase\n\nThe OKF bundle is an integral part of the Italian-OSS-Legal-Platform, connecting various components through its hierarchical structure and policy tracciabili. The bundle provides a standardized framework for managing legal data, which is essential for ensuring the accuracy, consistency, and accessibility of this data.\n\n### Mermaid Diagram: Call Graph\n\n```mermaid\ngraph LR\n    A[OKF Bundle] -->|fonti dati|> B[Normative Sources]\n    A -->|modello dati|> C[Data Models]\n    A -->|architettura|> D[Components and RAG Flow]\n    A -->|glossario|> E[Terms and Definitions]\n```\n\nThis Mermaid diagram illustrates the relationships between the OKF bundle components, highlighting their connections to other parts of the platform.\n\n### Execution Flows\n\nNo execution flows are detected for this module. The OKF bundle is primarily a knowledge base that provides a standardized framework for managing legal data, rather than an executable component.\n\n## Conclusion\n\nThe Italian-OSS-Legal-Platform's Open Knowledge Format (OKF) bundle serves as a critical component of the platform, providing a comprehensive framework for managing legal data. Its hierarchical structure and policy tracciabili ensure accuracy, consistency, and accessibility of this data. The OKF bundle connects various components through its relationships with normative sources, data models, architectures, and glossaries, making it an essential part of the Italian-OSS-Legal-Platform.","other-package-json":"# Other — package.json\n\n**Package.json Module Documentation**\n\n## Overview\n\nThe `package.json` file is the primary configuration file for the Italian Oss Legal Platform project. It contains metadata about the project, such as its name, version, and dependencies.\n\n## Purpose\n\nThe purpose of this module is to serve as a central hub for managing project dependencies, scripts, and configurations. It provides a way to define how the project should be built, tested, and executed.\n\n## How it Works\n\nWhen the `package.json` file is loaded, npm (Node Package Manager) uses its contents to determine which packages to install, build, or run. The module's scripts are executed using the `npm run` command, which allows developers to automate tasks such as building, testing, and deploying the project.\n\n## Key Components\n\n* **name**: The name of the project.\n* **version**: The version number of the project.\n* **private**: A flag indicating whether the project is private or not.\n* **description**: A brief description of the project.\n* **license**: The license under which the project is released.\n* **workspaces**: An array of workspace directories to include in the build process.\n* **scripts**: An object containing scripts that can be executed using `npm run`.\n* **devDependencies**: An object containing dependencies required for development.\n* **engines**: An object specifying minimum versions for Node.js and npm.\n\n## Scripts\n\nThe following scripts are defined in the `package.json` file:\n\n| Script | Description |\n| --- | --- |\n| build | Builds the project using `npm run build --workspaces --if-present`. |\n| check | Runs a series of checks, including documentation validation, type checking, testing, and building. |\n| check:docs | Validates documentation using the `python scripts/check_docs.py` script. |\n| dev | Starts the development server using `npm --workspace @italian-oss-legal-platform/web run dev`. |\n| evaluate | Runs tests for evaluation using `npm --workspace @italian-oss-legal-platform/evaluation run test`. |\n| ingest:esempio | Ingests an example into the system using `npm --workspace @italian-oss-legal-platform/ingest run ingest:esempio --`. |\n| test | Runs tests for the project using `npm run test --workspaces --if-present`. |\n| typecheck | Runs type checking using `npm run typecheck --workspaces --if-present`. |\n| worker:ingest | Ingests data into the system using `npm --workspace @italian-oss-legal-platform/worker run ingest:once`. |\n| worker:migrate | Migrates data in the system using `npm --workspace @italian-oss-legal-platform/worker run migrate`. |\n| worker:schedule | Schedules tasks for the worker using `npm --workspace @italian-oss-legal-platform/worker run schedule`. |\n| worker:status | Displays the status of the worker using `npm --workspace @italian-oss-legal-platform/worker run status`. |\n\n## Connection to the Rest of the Codebase\n\nThe `package.json` file is used by various parts of the codebase, including:\n\n* The build process, which uses scripts defined in this file.\n* The testing framework, which uses scripts defined in this file.\n* The worker module, which uses scripts defined in this file.\n\n## Mermaid Diagram: Package.json Module Architecture\n\n```mermaid\ngraph LR\n    style package.json fill:#f9f,stroke:#333,stroke-width:2px\n    package.json[\"Package.json\"]\n    package.json-->|Build|>npm run build\n    package.json-->|Check|>npm run check\n    package.json-->|Test|>npm run test\n    package.json-->|Type Check|>npm run typecheck\n    package.json-->|Dev|>npm --workspace @italian-oss-legal-platform/web run dev\n    package.json-->|Evaluate|>npm --workspace @italian-oss-legal-platform/evaluation run test\n    package.json-->|Ingest:esempio|>npm --workspace @italian-oss-legal-platform/ingest run ingest:esempio --\n    package.json-->|Worker:ingest|>npm --workspace @italian-oss-legal-platform/worker run ingest:once\n    package.json-->|Worker:migrate|>npm --workspace @italian-oss-legal-platform/worker run migrate\n    package.json-->|Worker:schedule|>npm --workspace @italian-oss-legal-platform/worker run schedule\n    package.json-->|Worker:status|>npm --workspace @italian-oss-legal-platform/worker run status\n```","other-readme-md":"# Other — README.md\n\n**Magistra OS Architecture**\n==========================\n\n**Overview**\n------------\n\nMagistra OS is an open-source, self-hosted platform for research in Italian law with verifiable citations. It serves as an assistant for research in Italian law, requiring verifiable citations for public sources.\n\n**Architecture Components**\n-------------------------\n\n### 1. Backend (Express TypeScript)\n\nThe backend is built using Node.js and TypeScript, providing APIs for:\n\n*   **Domande**: Handling user queries\n*   **Fonti**: Managing source data\n*   **Stato Ingest**: Tracking ingest operations\n*   **Documenti Utente**: Managing user documents\n*   **Review Umana**: Handling human review\n\n### 2. Frontend (Next.js)\n\nThe frontend is built using Next.js, providing a console for:\n\n*   **Domande-Risposte**: Displaying query results\n*   **Fonti Recuperate**: Showing retrieved sources\n*   **Viewer del Documento Sorgente**: Viewing source documents\n\n### 3. Domain Layer (Packages/domain)\n\nThe domain layer provides types and invariant checks for:\n\n*   **Norma**: Normative acts\n*   **Versione**: Versions\n*   **Manifestazione**: Manifestations\n*   **Item Fonte**: Source items\n*   **Unità**: Units\n*   **Chunk**: Chunks\n*   **Citazioni**: Citations\n\n### 4. Ingest (Packages/ingest)\n\nThe ingest package handles:\n\n*   **Parser Normattiva Multivigenza**: Parsing Normativa data\n*   **Generazione Chunk Citabili**: Generating citable chunks\n*   **Comando Locale per Prodotto Manifesti JSON**: Producing manifest JSON\n\n### 5. Retrieval (Packages/retrieval)\n\nThe retrieval package provides:\n\n*   **Ricerca Locale con Filtri**: Local search with filters\n*   **Retrieval Ibrido con Embedding Deterministici**: Hybrid retrieval with deterministic embeddings\n\n### 6. LLM (Packages/llm)\n\nThe LLM package handles:\n\n*   **Contratti Provider per Embedding e Risposta**: Providing embedding and response contracts\n*   **Stub Locale Citazionale e Provider OpenAI Compatibile Sostituibile**: Local citational stub and OpenAI compatible provider\n\n### 7. Sources (Packages/sources)\n\nThe sources package manages:\n\n*   **Registro Fonti Normattiva, EUR-Lex, Gazzetta Ufficiale e Giurisprudenza Aperta**: Registering Normattiva, EUR-Lex, Gazzetta Ufficiale, and open justice sources\n*   **Policy di Riuso e Download AKN Consentito**: Policy for reuse and download of AKN\n\n### 8. Worker (Packages/worker)\n\nThe worker package handles:\n\n*   **Migrazioni**: Migrations\n*   **Ingest Persistito**: Persistent ingest\n*   **Archiviazione Fonti e Stato Job**: Archiving sources and job state\n*   **Ingest da URL Normattiva e Scheduler Periodico**: Ingest from Normattiva URLs and periodic scheduler\n\n### 9. Evaluation (Packages/evaluation)\n\nThe evaluation package provides:\n\n*   **Dataset Minimo di Domande Attese e Metriche di Copertura Citazioni**: Minimum dataset for queries and coverage metrics of citations\n\n### 10. Database (Packages/database)\n\nThe database package manages:\n\n*   **Migrazioni SQL e Mappatura Tipizzata verso PostgreSQL + pgvector**: SQL migrations and typed mapping to PostgreSQL + pgvector\n*   **Upsert Runtime, Workflow Review, Documenti Utente e Policy Fonte**: Upsert runtime, review workflow, user documents, and source policy\n\n**Mermaid Diagram: Architecture**\n```mermaid\ngraph LR\n    backend[Backend (Express TypeScript)] -->|APIs|> frontend[Frontend (Next.js)]\n    backend -->|Ingest|> ingest[Ingest Package]\n    backend -->|Retrieval|> retrieval[Retrieval Package]\n    backend -->|LLM|> llm[LLM Package]\n    backend -->|Sources|> sources[Sources Package]\n    backend -->|Worker|> worker[Worker Package]\n    backend -->|Evaluation|> evaluation[Evaluation Package]\n    backend -->|Database|> database[Database Package]\n\n    frontend -->|Console|> console\n    frontend -->|Fonti Recuperate|> frontend[Frontend (Next.js)]\n\n    ingest -->|Parser Normattiva Multivigenza|> parser[Normattiva Parser]\n    ingest -->|Generazione Chunk Citabili|> chunk[Chunk Generator]\n\n    retrieval -->|Ricerca Locale con Filtri|> search[Search Service]\n    retrieval -->|Retrieval Ibrido con Embedding Deterministici|> hybrid[Hybrid Retrieval Service]\n\n    llm -->|Contratti Provider per Embedding e Risposta|> embedding[Embedding Contract]\n    llm -->|Stub Locale Citazionale e Provider OpenAI Compatibile Sostituibile|> openai[OpenAI Compatible Provider]\n\n    sources -->|Registro Fonti Normattiva, EUR-Lex, Gazzetta Ufficiale e Giurisprudenza Aperta|> normattiva[Normattiva Source Register]\n    sources -->|Policy di Riuso e Download AKN Consentito|> policy[AKN Reuse Policy]\n\n    worker -->|Migrazioni|> migration[Migration Service]\n    worker -->|Ingest Persistito|> ingest[Ingest Service]\n    worker -->|Archiviazione Fonti e Stato Job|> storage[Storage Service]\n    worker -->|Scheduler Periodico|> scheduler[Scheduler Service]\n\n    evaluation -->|Dataset Minimo di Domande Attese e Metriche di Copertura Citazioni|> dataset[Dataset Service]\n```\n**Development Workflow**\n----------------------\n\n### 1. Installazione\n\n```bash\nnpm install\n```\n\n### 2. Controllo dei Codici\n\n```bash\nnpm run check\n```\n\n### 3. Avvio dello Sviluppo\n\n```bash\nnpm run dev\n```\n\n### 4. Generazione Manifesti Ingest Locali\n\n```bash\nnpm run ingest:esempio\n```\n\n### 5. Archiviazione XML Originali\n\n```bash\nnpm run ingest:esempio -- --archive-sources\n```\n\n### 6. Valutazione Locale del Retrieval Citabile\n\n```bash\nnpm run evaluate\n```\n\n### 7. Migrazione Worker Persistito\n\n```bash\nnpm run worker:migrate\n```\n\n### 8. Scheda Periodica\n\n```bash\nnpm run worker:schedule\n```\n\n### 9. Stato Job\n\n```bash\nnpm run worker:status\n```\n**Nota Legale**\n---------------\n\nQuesto progetto fornisce informazioni giuridiche con fonti tracciabili. Non fornisce consulenza legale.","other-retrieval":"# Other — retrieval\n\n**Retrieval Module Documentation**\n\n**Overview**\n------------\n\nThe Retrieval module is responsible for retrieving relevant data from various sources, such as corpora, databases, and APIs, to support the legal platform's functionality. It provides a unified interface for accessing this data, allowing developers to build applications that can query and retrieve information efficiently.\n\n**Purpose**\n----------\n\nThe primary purpose of the Retrieval module is to provide a robust and scalable way to retrieve relevant data from various sources, enabling the development of intelligent applications that can answer complex questions and provide insights based on legal knowledge.\n\n**How it Works**\n----------------\n\nThe Retrieval module uses a combination of natural language processing (NLP) techniques and machine learning algorithms to analyze user queries and identify relevant data sources. The module consists of several key components:\n\n*   **Corpus**: A collection of documents, articles, and other written content that are used as training data for the NLP models.\n*   **Database**: A repository of structured data that is used to store and retrieve information related to specific topics or domains.\n*   **APIs**: External APIs that provide access to additional data sources, such as news articles, academic papers, or government reports.\n\nThe Retrieval module uses a hybrid approach to retrieve relevant data:\n\n1.  **Exact Match**: The module first searches for exact matches between the user query and the corpus or database.\n2.  **Fuzzy Matching**: If no exact match is found, the module uses fuzzy matching techniques to find similar phrases or words in the corpus or database.\n3.  **Ranking**: The retrieved data is then ranked based on relevance, confidence, and other factors to provide the most accurate results.\n\n**Key Components**\n-----------------\n\nThe Retrieval module consists of several key components:\n\n*   **`cercaCorpusLegaleIbrido`**: A function that retrieves data from a hybrid corpus, which combines multiple sources of information.\n*   **`cercaCorpusLegale`**: A function that retrieves data from a single corpus or database.\n*   **`getCorpusDimostrativo`**: A function that returns a demonstration corpus for testing and development purposes.\n*   **`rispondiConFonti`**: A function that generates a response based on the retrieved data, including citations and references.\n*   **`rispondiConFontiRag`**: A function that generates a response with additional features, such as model, embedding, and review human.\n\n**Call Graph & Execution Flows**\n--------------------------------\n\nThe Retrieval module has the following outgoing calls:\n\n```mermaid\ngraph LR\n    sub graph retrieval.test.ts (retrieval/test/retrieval.test.ts) {\n        A[cercaCorpusLegaleIbrido] --> B[rispondiConFontiRag]\n        A[getCorpusDimostrativo] --> C[rispondiConFonti]\n        A[cercaCorpusLegale] --> D[rispondiConFonti]\n    }\n    sub graph retrieval/src/index.ts (retrieval/src/index.ts) {\n        E[cercaCorpusLegaleIbrido] --> F[cercaCorpusLegale]\n        E[getCorpusDimostrativo] --> G[cercaCorpusLegale]\n        E[rispondiConFontiRag] --> H[rispondiConFonti]\n    }\n```\n\n**Connections to the Rest of the Codebase**\n------------------------------------------\n\nThe Retrieval module connects to other parts of the codebase through various APIs and interfaces:\n\n*   **`@italian-oss-legal-platform/domain`**: The Retrieval module uses this domain-specific library to access domain knowledge and provide more accurate results.\n*   **`@italian-oss-legal-platform/ingest`**: The Retrieval module uses this ingestion library to process and integrate data from various sources.\n\n**Conclusion**\n----------\n\nThe Retrieval module is a critical component of the legal platform, providing a unified interface for accessing relevant data from various sources. Its hybrid approach to retrieval, combining exact match, fuzzy matching, and ranking, enables it to provide accurate results even in complex queries. By understanding how the Retrieval module works and its key components, developers can build applications that leverage this powerful functionality to answer complex questions and provide insights based on legal knowledge.","other-roadmap-md":"# Other — ROADMAP.md\n\n**Magistra OS Knowledge Base Roadmap**\n\nThe Magistra OS knowledge base roadmap is a comprehensive guide that outlines the development plan for the Magistra OS project's knowledge base. The roadmap provides a clear direction for the project, ensuring that all stakeholders are aligned and working towards a common goal.\n\n**Purpose**\n\nThe primary purpose of this roadmap is to provide a structured approach to developing the Magistra OS knowledge base. It ensures that the project stays on track, meets its objectives, and delivers high-quality results.\n\n**How it Works**\n\nThe roadmap is divided into seven phases, each representing a significant milestone in the development process. The phases are:\n\n1. **Fondazione Repository e Documentazione**: This phase focuses on setting up the foundation for the knowledge base, including creating the repository, writing documentation, and establishing a workflow for contributions.\n2. **Roadmap**: In this phase, we create the roadmap itself, outlining the key components, milestones, and timelines for each phase.\n3. **Interfaccia**: We develop the user interface (UI) for the knowledge base, including the shell applicativa Next.js, chat interface, search functionality, and viewer fonti with anchor articolo e comma.\n4. **Servizi**: In this phase, we create the backend services, including the API orchestration RAG, job ingest service, and interfaccia fornitore LLM.\n5. **Dati E Ingest**: We develop the data ingestion pipeline, including the adapter Normattiva, parser AKN, and normalizzazione testo.\n6. **Infrastruttura**: This phase focuses on setting up the infrastructure, including PostgreSQL + pgvector, snapshot database tipizzato, archiviazione oggetti MinIO, Docker Compose, CI, migrazioni, backup, and health check.\n7. **Qualità**: In the final phase, we focus on ensuring the quality of the knowledge base, including test unitari e di integrazione, corpus di esempio Legge 241/1990, and controlli UX su sicurezza e assenza di consulenza legale.\n\n**Key Components**\n\nThe Magistra OS knowledge base roadmap consists of several key components:\n\n* **Adapter Normattiva**: An adapter that connects to the Normattiva Open Data platform, providing access to Italian legislation.\n* **Parser AKN**: A parser that extracts relevant information from AKN documents, including articles and sections.\n* **Normalizzazione Testo**: A normalization process that standardizes text data, ensuring consistency across the knowledge base.\n* **Pipeline Chunking ed Embedding**: A pipeline that chunks and embeds data, enabling efficient storage and retrieval of the knowledge base.\n\n**Connections to the Rest of the Codebase**\n\nThe Magistra OS knowledge base roadmap connects to other parts of the codebase through several interfaces:\n\n* **API Orchestration RAG**: The API orchestration service is used to manage the knowledge base's backend services.\n* **Job Ingest Service**: The job ingest service is responsible for processing and ingesting data into the knowledge base.\n* **Interfaccia Fornitore LLM**: The interfaccia fornitore LLM provides access to the language model, enabling natural language processing tasks.\n\n**Mermaid Diagram**\n\n```mermaid\ngraph LR\n    A[Adapter Normattiva] -->|connection|> B[Parser AKN]\n    B -->|output|> C[Normalizzazione Testo]\n    C -->|output|> D[Pipeline Chunking ed Embedding]\n    D -->|output|> E[Knowledge Base]\n    F[API Orchestration RAG] -->|management|> G[Backend Services]\n    H[Job Ingest Service] -->|processing|> I[Data]\n    J[Interfaccia Fornitore LLM] -->|access|> K[Language Model]\n```\n\nThis Mermaid diagram illustrates the connections between the key components of the Magistra OS knowledge base roadmap, providing a visual representation of how they interact and depend on each other.","other-sources":"# Other — sources\n\n**Sources Module Documentation**\n\n**Overview**\n------------\n\nThe Sources module is responsible for managing and interacting with external data sources, such as Normattiva, EurLex, Gazzetta Ufficiale, and Giurisprudenza Aperta. It provides a unified interface for accessing and processing this data, ensuring consistency and accuracy across the application.\n\n**Purpose**\n------------\n\nThe primary purpose of the Sources module is to:\n\n* Provide a centralized repository for external data sources\n* Offer a standardized API for interacting with these sources\n* Ensure data consistency and accuracy through validation and verification mechanisms\n* Facilitate data processing and transformation for use in the application\n\n**Key Components**\n------------------\n\n### 1. Data Adapters\n\nData adapters are classes that wrap around external data sources, providing a standardized interface for accessing and manipulating their data. The Sources module includes several built-in data adapters:\n\n* `NormattivaAdapter`\n* `EurLexAdapter`\n* `GazzettaUfficialeAdapter`\n* `GiurisprudenzaApertaAdapter`\n\nEach adapter is responsible for handling specific data formats, validation rules, and verification mechanisms.\n\n### 2. Data Validation\n\nData validation is a critical component of the Sources module. It ensures that incoming data conforms to expected formats and rules, preventing errors and inconsistencies in the application. The module includes several validation functions:\n\n* `validaRiuso`: Verifies whether a source has been approved for reuse\n* `assertRiusoConsentito`: Asserts that a source has been approved for reuse\n\n### 3. Data Processing\n\nData processing involves transforming and manipulating data from external sources to meet the application's requirements. The Sources module includes several functions for this purpose:\n\n* `fontiCatalogabili`: Returns a list of catalogable fonts\n* `creaRegistroFonti`: Creates a registry of font sources\n* `pianificaRichieste`: Plans requests for specific data sources\n\n### 4. Data Retrieval\n\nData retrieval involves fetching data from external sources and returning it to the application. The Sources module includes several functions for this purpose:\n\n* `scaricaAttoNormattivaOpenData`: Retrieves an Act of Normattiva Open Data\n* `scaricaDocumentoAkomaNtoso`: Retrieves a Document Akoma Ntoso\n\n**Call Graph & Execution Flows**\n---------------------------------\n\nThe following Mermaid diagram illustrates the call graph and execution flows for the Sources module:\n\n```mermaid\ngraph LR\n    A[Sources.test.ts] -->|creaRegistroFonti|> B[src/index.ts]\n    A[Sources.test.ts] -->|GazzettaUfficialeAdapter|> C[src/index.ts]\n    A[Sources.test.ts] -->|scaricaAttoNormattivaOpenData|> D[src/index.ts]\n    A[Sources.test.ts] -->|validaRiuso|> E[src/index.ts]\n    A[Sources.test.ts] -->|pianificaRichieste|> F[src/index.ts]\n    A[Sources.test.ts] -->|scaricaDocumentoAkomaNtoso|> G[src/index.ts]\n    A[Sources.test.ts] -->|NormattivaAdapter|> H[src/index.ts]\n    A[Sources.test.ts] -->|GiurisprudenzaApertaAdapter|> I[src/index.ts]\n    A[Sources.test.ts] -->|fontiCatalogabili|> J[src/index.ts]\n    A[Sources.test.ts] -->|assertRiusoConsentito|> K[src/index.ts]\n    A[Sources.test.ts] -->|EurLexAdapter|> L[src/index.ts]\n    A[Sources.test.ts] -->|creaUrlNormattivaDaUrn|> M[src/index.ts]\n```\n\n**Connecting to the Rest of the Codebase**\n-----------------------------------------\n\nThe Sources module is designed to integrate seamlessly with other components in the codebase. It provides a standardized API for interacting with external data sources, ensuring consistency and accuracy across the application.\n\n* The `Sources` module is imported by the main application entry point (`main.ts`)\n* The `Sources` module is used throughout the application to access and process external data\n* The `Sources` module is responsible for handling errors and exceptions related to data retrieval and processing\n\n**Conclusion**\n----------\n\nThe Sources module provides a critical component of the application's architecture, ensuring consistency and accuracy in the use of external data sources. Its standardized API and robust validation mechanisms make it an essential part of the codebase.","other-tsconfig-base-json":"# Other — tsconfig.base.json\n\n**tsconfig.base.json Module Documentation**\n\n**Overview**\n------------\n\nThe `tsconfig.base.json` module serves as the foundation for the project's TypeScript configuration. It defines the base settings that are applied to all other configurations in the project.\n\n**Purpose**\n----------\n\nThe primary purpose of this module is to establish a consistent set of compiler options and module resolution strategies across the project. By doing so, it ensures that all compiled files share a common understanding of how to handle imports, exports, and other TypeScript features.\n\n**How it Works**\n----------------\n\nWhen the `tsconfig.base.json` module is loaded, its contents are merged with any other configuration modules in the project. The resulting configuration is then used by the TypeScript compiler to compile all source files.\n\nThe key components of this module include:\n\n*   **compilerOptions**: This section defines various settings that control how the TypeScript compiler operates. These options include:\n    *   `allowSyntheticDefaultImports`: Enables the use of synthetic default imports, which allow for importing modules with a default export.\n    *   `esModuleInterop`: Enables interoperability between ES modules and CommonJS modules.\n    *   `forceConsistentCasingInFileNames`: Forces consistent casing in file names across the project.\n    *   `isolatedModules`: Isolates modules from each other, preventing them from accessing external variables or functions.\n    *   `module`: Specifies the module system to use (in this case, ESNext).\n    *   `moduleResolution`: Determines how the compiler resolves module imports (in this case, using the Bundler resolver).\n    *   `noUncheckedIndexedAccess`: Disables unchecked indexed access, which can lead to security vulnerabilities.\n    *   `resolveJsonModule`: Enables resolution of JSON modules.\n    *   `skipLibCheck`: Skips checking for library dependencies.\n    *   `strict`: Enables strict mode, which enforces more rigorous coding standards.\n    *   `target`: Specifies the target JavaScript version (in this case, ES2022).\n*   **moduleResolution**: This option determines how the compiler resolves module imports. In this case, it uses the Bundler resolver.\n\n**Key Components**\n------------------\n\nThe following components are worth noting:\n\n*   **Bundler Resolver**: The Bundler resolver is used to resolve module imports in this configuration.\n*   **ESNext Module System**: The ESNext module system is used to handle imports and exports in this project.\n\n**Connections to the Rest of the Codebase**\n------------------------------------------\n\nThis module connects to other parts of the codebase through the following means:\n\n*   **Configuration Merging**: This module's contents are merged with any other configuration modules in the project.\n*   **Compiler Options**: The compiler options defined in this module are applied to all compiled files.\n\n**Call Graph & Execution Flows**\n------------------------------\n\nThe call graph and execution flows for this module are as follows:\n\nInternal calls: None\nOutgoing calls: None\nIncoming calls: None\nExecution flows: No execution flows detected for this module.\n\n**Mermaid Diagram**\n-----------------\n\n```mermaid\ngraph LR\n    A[tsconfig.base.json] -->|compilerOptions|> B[allowSyntheticDefaultImports]\n    A[tsconfig.base.json] -->|compilerOptions|> C[esModuleInterop]\n    A[tsconfig.base.json] -->|compilerOptions|> D[forceConsistentCasingInFileNames]\n    A[tsconfig.base.json] -->|compilerOptions|> E[isolatedModules]\n    A[tsconfig.base.json] -->|compilerOptions|> F[module]\n    A[tsconfig.base.json] -->|compilerOptions|> G[moduleResolution]\n    A[tsconfig.base.json] -->|compilerOptions|> H[noUncheckedIndexedAccess]\n    A[tsconfig.base.json] -->|compilerOptions|> I[resolveJsonModule]\n    A[tsconfig.base.json] -->|compilerOptions|> J[skipLibCheck]\n    A[tsconfig.base.json] -->|compilerOptions|> K[strict]\n    A[tsconfig.base.json] -->|compilerOptions|> L[target]\n```","other-web":"# Other — web\n\n**Module Documentation: Pannello Operativo**\n\n**Overview**\n\nThe Pannello Operativo (Operative Panel) is a critical component of the Legal Platform, responsible for managing the workflow of documents and reviews. It provides a centralized interface for users to interact with the platform, perform various operations, and track the status of their documents.\n\n**Purpose**\n\nThe primary purpose of the Pannello Operativo is to facilitate the efficient management of documents and reviews, ensuring that users can easily navigate through the process, access relevant information, and receive timely updates on the status of their documents.\n\n**How it Works**\n\nThe Pannello Operativo works by connecting to various backend services, including:\n\n1. **Document Management**: The platform's document management system provides access to a vast repository of documents, which can be searched, filtered, and retrieved.\n2. **Review Queue**: The review queue service manages the workflow of reviews, ensuring that documents are properly assigned, reviewed, and updated.\n3. **Token Operatore**: The token operatore service is responsible for authenticating users, generating tokens, and managing access to sensitive data.\n\n**Key Components**\n\n1. **Console Domanda**: A user interface component that allows users to interact with the platform, perform various operations, and track the status of their documents.\n2. **Stato Ingest**: A module responsible for managing the workflow of ingest (document upload) requests, ensuring that documents are properly processed and stored.\n3. **Pannello Operativo**: The main component of this module, providing a centralized interface for users to interact with the platform.\n\n**Connections to Other Components**\n\nThe Pannello Operativo connects to various other components in the codebase, including:\n\n1. **Document Management**: The platform's document management system provides access to a vast repository of documents.\n2. **Review Queue**: The review queue service manages the workflow of reviews, ensuring that documents are properly assigned, reviewed, and updated.\n3. **Token Operatore**: The token operatore service is responsible for authenticating users, generating tokens, and managing access to sensitive data.\n\n**Mermaid Diagram**\n\n```mermaid\ngraph LR\n    A[Console Domanda] -->|handleOpenSource|> B[Pannello Operativo]\n    B -->|tokenOperatore|> C[Token Operatore]\n    B -->|safeDecode|> D[Document Management]\n    B -->|parseJson|> E[Review Queue]\n    C -->|get|> F[Sources]\n    C -->|post|> G[API/Ask]\n```\n\nThis Mermaid diagram illustrates the connections between the Pannello Operativo, Console Domanda, Token Operatore, Document Management, and Review Queue services.\n\n**Execution Flows**\n\nThe Pannello Operativo is part of several execution flows in the codebase, including:\n\n1. **GET → AsRecord**: A flow that retrieves a document from the platform's repository and processes it for review.\n2. **GET → ReadAttribute**: A flow that retrieves a document from the platform's repository and extracts relevant attributes.\n3. **GET → GazzettaUfficialeAdapter**: A flow that retrieves a document from the platform's repository and applies Gazzetta Ufficiale adapters to process the data.\n\n**Conclusion**\n\nThe Pannello Operativo is a critical component of the Legal Platform, providing a centralized interface for users to interact with the platform, perform various operations, and track the status of their documents. Its connections to other components in the codebase ensure that it can efficiently manage the workflow of documents and reviews, ensuring a seamless user experience.","other-worker":"# Other — worker\n\n**Normattiva Adapter Module Documentation**\n\n**Overview**\n------------\n\nThe Normattiva adapter is a critical component of the [EurLex](https://eurlex.europa.eu/) project, responsible for integrating Normattiva data into the EurLex platform. This module provides a bridge between the Normattiva API and the EurLex application, enabling seamless data exchange and synchronization.\n\n**Purpose**\n----------\n\nThe primary purpose of this module is to:\n\n1. Fetch Normattiva data from the API\n2. Process and transform the data according to EurLex requirements\n3. Store the processed data in the EurLex database\n\n**How it Works**\n-----------------\n\nThe Normattiva adapter works as follows:\n\n1. **Initialization**: The module initializes by connecting to the Normattiva API using a provided credentials object.\n2. **Data Fetching**: The module fetches data from the Normattiva API based on user-defined parameters (e.g., search query, date range).\n3. **Data Processing**: The fetched data is processed and transformed into a format suitable for EurLex by applying various transformations, such as:\n\t* Data normalization\n\t* Data filtering\n\t* Data aggregation\n4. **Data Storage**: The processed data is stored in the EurLex database using a provided storage object.\n\n**Key Components**\n------------------\n\n1. **Normattiva API Client**: A custom client library that interacts with the Normattiva API.\n2. **Data Processing Pipeline**: A series of transformations and operations applied to the fetched data to prepare it for EurLex.\n3. **EurLex Storage Interface**: An interface that provides a way to store data in the EurLex database.\n\n**Connections to Other Components**\n-----------------------------------\n\nThe Normattiva adapter connects to other components in the following ways:\n\n1. **Main Application**: The module is initialized by the main application, which provides necessary credentials and storage objects.\n2. **EurLex Database**: The processed data is stored in the EurLex database using the provided storage interface.\n3. **Query Service**: The Normattiva adapter interacts with the query service to fetch data from the Normattiva API.\n\n**Mermaid Diagram**\n------------------\n\n```mermaid\ngraph LR\n    A[Main Application] -->|init|> B[Normattiva Adapter]\n    B -->|fetch data|> C[Normattiva API Client]\n    C -->|process data|> D[Data Processing Pipeline]\n    D -->|store data|> E[EurLex Storage Interface]\n    B -->|query service|> F[Query Service]\n```\n\nThis diagram illustrates the main components and their interactions, showcasing how the Normattiva adapter connects to other parts of the codebase.\n\n**API Documentation**\n---------------------\n\nThe Normattiva adapter provides several APIs for interacting with its functionality:\n\n1. **`fetchData`**: Fetches data from the Normattiva API based on user-defined parameters.\n2. **`processData`**: Processes and transforms fetched data according to EurLex requirements.\n3. **`storeData`**: Stores processed data in the EurLex database using a provided storage object.\n\nThese APIs can be accessed through the module's public interface, allowing other components to interact with its functionality.","other":"# Other\n\n**Module Group Overview**\n\nThe module group is a collection of interconnected components that form the backbone of the Italian OSS Legal Platform. Its primary purpose is to provide a robust and scalable infrastructure for managing, processing, and retrieving legal data.\n\n**Sub-Modules and Key Workflows**\n\nThe module group consists of several sub-modules that work together to achieve its goals:\n\n*   **Sources**: Manages external data sources, such as Normattiva, EurLex, Gazzetta Ufficiale, and Giurisprudenza Aperta. ([Sources](sources/src/index.md))\n*   **Retrieval**: Retrieves relevant data from various sources, including corpora, databases, and APIs. ([Retrieval](retrieval/src/index.ts)]\n*   **Ingest**: Processes and transforms raw data into a standardized format for use in the application. ([Ingest](ingest/src/index.ts)]\n*   **Backend**: Handles server-side logic, including data storage, retrieval, and manipulation. ([Backend](backend/src/index.ts)]\n*   **Frontend**: Provides a user interface for interacting with the platform, including data visualization and query capabilities. ([Frontend](src/components/pannello-operativo.tsx)]\n\n**Key Workflows**\n\nThe module group enables several key workflows that span multiple sub-modules:\n\n1.  **Data Ingestion**: The `Ingest` module processes raw data from external sources, such as XML files or text documents, and transforms it into a standardized format for use in the application.\n2.  **Data Retrieval**: The `Retrieval` module retrieves relevant data from various sources, including corpora, databases, and APIs, to support the legal platform's functionality.\n3.  **Data Storage and Manipulation**: The `Backend` module handles server-side logic, including data storage, retrieval, and manipulation, to ensure consistency and accuracy across the application.\n4.  **Data Visualization and Querying**: The `Frontend` module provides a user interface for interacting with the platform, including data visualization and query capabilities.\n\n**Cross-Module Calls**\n\nThe sub-modules frequently exchange data through cross-module calls, which enable seamless communication between components:\n\n*   **GET → AsRecord**: Retrieves data from external sources and transforms it into a standardized format.\n*   **GET → ReadAttribute**: Retrieves specific attributes from data sources.\n*   **GET → GazzettaUfficialeAdapter**: Adapts data from the Gazzetta Ufficiale API to support the platform's functionality.\n\nBy understanding how these sub-modules fit together and the key workflows they enable, developers can build a robust and scalable legal platform that meets the needs of its users.","overview":"# Italian-OSS-Legal-Platform — Wiki\n\n## Italian OSS Legal Platform Overview\n\nThe Italian OSS Legal Platform is an open-source, cloud-native platform designed to support research and analysis of Italian law. The platform provides a robust infrastructure for managing, processing, and retrieving legal data, with a focus on accuracy, scalability, and user experience.\n\n### Architecture Overview\n\nThe platform's architecture consists of several interconnected modules, each responsible for a specific function:\n\n*   **Sources**: Manages external data sources, such as Normattiva, EurLex, Gazzetta Ufficiale, and Giurisprudenza Aperta.\n*   **Retrieval**: Retrieves relevant data from various sources and processes it for use in the platform.\n*   **Ingest**: Collects and normalizes data from multiple sources, making it accessible for downstream applications.\n*   **Database**: Manages data storage and retrieval, providing a unified interface for interacting with various databases.\n*   **EmbeddingProvider**: Generates embeddings, which are numerical representations of input strings, used in various applications such as text classification, clustering, and information retrieval.\n\n### Key End-to-End Flows\n\nThe platform supports several key end-to-end flows:\n\n*   **GET → AsRecord** (cross_community): Retrieves data from sources, processes it, and returns it as a record.\n*   **PreparaCorpusConEmbedding → AsRecord** (cross_community): Prepares the corpus with embeddings, retrieves data, and returns it as a record.\n*   **CercaCorpusLegale → AsRecord** (cross_community): Searches for relevant data in the corpus, processes it, and returns it as a record.\n*   **RispondiConFontiRag → AsRecord** (cross_community): Responds to queries with relevant data from sources, processes it, and returns it as a record.\n\n### Mermaid Architecture Diagram\n\n```mermaid\ngraph LR\n    title Italian OSS Legal Platform Architecture\n    Sources[Sources] -->|data source|> Retrieval[Retrieval]\n    Retrieval -->|processed data|> Ingest[Ingest]\n    Ingest -->|normalized data|> Database[Database]\n    Database -->|stored data|> EmbeddingProvider[EmbeddingProvider]\n    EmbeddingProvider -->|embeddings|> Evaluation[Evaluation]\n    Evaluation -->|evaluated data|> OpzioniRetrievalIbrido[OpzioniRetrievalIbrido]\n    OpzioniRetrievalIbrido -->|processed data|> Retrieval[Retrieval]\n    Retrieval -->|returned data|> AsRecord[AsRecord]\n```\n\n### Setup Instructions\n\nTo set up the platform, follow these steps:\n\n1.  Clone the repository using `git clone https://github.com/italian-oss-legal-platform.git`.\n2.  Install the required dependencies by running `npm install` or `yarn install`.\n3.  Start the platform by running `npm start` or `yarn start`.\n\nNote: This is a high-level overview of the project, and for more detailed information on each module, please refer to the individual module documentation pages.\n\n[Sources](sources/src/index.md)\n[Retrieval](retrieval/src/index.ts)\n[Ingest](ingest/src/index.ts)\n[Database](database/src/index.ts)\n[EmbeddingProvider](embedding-provider/src/index.ts)\n[Evaluation](evaluation/src/index.ts)\n[OpzioniRetrievalIbrido](opzioni-retrieval-ibrido/src/index.ts)","retrieval":"# Retrieval\n\n**Retrieval Module Documentation**\n\n**Overview**\n------------\n\nThe Retrieval module is responsible for retrieving and processing data from various sources, including databases, APIs, and file systems. Its primary purpose is to provide a unified interface for accessing and managing data across different domains.\n\n**How it Works**\n-----------------\n\nThe Retrieval module consists of three main functions:\n\n1.  **leggiStatoIngest**: Retrieves the current state of an ingest job from the database.\n2.  **creaDatabaseDaEnv**: Creates a new database connection based on the environment variables provided.\n3.  **leggiStatoIngestDaEnv**: Retrieves the current state of an ingest job from the environment variables and creates a new database connection if necessary.\n\nHere's a high-level overview of how these functions interact:\n\n*   The `leggiStatoIngest` function queries the database for the latest ingest job data.\n*   If no data is found, it calls `creaDatabaseDaEnv` to create a new database connection and then retries the query.\n*   If data is found, it processes the result and returns the state of the ingest job.\n\n**Key Components**\n------------------\n\n### leggiStatoIngest\n\n*   **Functionality**: Retrieves the current state of an ingest job from the database.\n*   **Parameters**: `database` (QueryableDatabase)\n*   **Returns**: StatoIngestApi\n*   **Notes**: This function uses a SQL query to retrieve data from the database. If no data is found, it calls `creaDatabaseDaEnv` to create a new database connection and then retries the query.\n\n### creaDatabaseDaEnv\n\n*   **Functionality**: Creates a new database connection based on the environment variables provided.\n*   **Parameters**: `env` (NodeJS.ProcessEnv)\n*   **Returns**: pg.Client\n*   **Notes**: This function uses the `pg` library to create a new database connection. If no connection string is provided, it throws an error.\n\n### leggiStatoIngestDaEnv\n\n*   **Functionality**: Retrieves the current state of an ingest job from the environment variables and creates a new database connection if necessary.\n*   **Parameters**: `env` (NodeJS.ProcessEnv)\n*   **Returns**: StatoIngestApi\n*   **Notes**: This function checks if the `DATABASE_URL` environment variable is set. If it's not, it calls `creaDatabaseDaEnv` to create a new database connection and then retries the query.\n\n**Connections to Other Modules**\n------------------------------\n\nThe Retrieval module connects to other modules in the following ways:\n\n*   **Backend**: The Retrieval module interacts with backend modules such as `leggiDocumentoUtente`, `leggiFonteDaDatabase`, `listaDocumentiUtente`, and `accodaReview` through the `creaDatabaseDaEnv` function.\n*   **API**: The Retrieval module is called by the API server (`server.ts`) through the `leggiStatoIngestDaEnv` function.\n\n**Mermaid Diagram**\n------------------\n\n```mermaid\ngraph LR\n    A[GET (ingest/status/route.ts)] -->|leggiStatoIngestDaEnv| B[worker/src/status.ts]\n    B -->|fontiCatalogabili| C[sources/src/index.ts]\n    B -->|query| D[database/src/index.ts]\n    E[NormattivaAdapter] --> F[creaRegistroFonti]\n    G[GazzettaUfficialeAdapter] --> H[creaRegistroFonti]\n    I[EurLexAdapter] --> J[creaRegistroFonti]\n    K[Query] --> L[creaRegistroFonti]\n```\n\nThis Mermaid diagram illustrates the flow of data from the API server to the Retrieval module and then to other modules in the codebase. It shows how the `leggiStatoIngestDaEnv` function interacts with other functions and modules, including fontiCatalogabili, query, NormattivaAdapter, GazzettaUfficialeAdapter, EurLexAdapter, and Query.\n\n**Conclusion**\n----------\n\nThe Retrieval module provides a unified interface for accessing and managing data across different domains. Its key components include the `leggiStatoIngest`, `creaDatabaseDaEnv`, and `leggiStatoIngestDaEnv` functions, which work together to retrieve and process data from various sources. The module connects to other modules in the codebase through the `creaDatabaseDaEnv` function and is called by the API server through the `leggiStatoIngestDaEnv` function."};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
