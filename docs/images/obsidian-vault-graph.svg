  <defs>
    <linearGradient id="facet" x1="42" y1="25" x2="181" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8BFFF"/>
      <stop offset="1" stop-color="#3B2A88" stop-opacity="0.25"/>
