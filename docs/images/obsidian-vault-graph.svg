<svg width="560" height="180" viewBox="0 0 560 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Apri il grafo 3D del vault Obsidian di Magistra</title>
  <desc id="desc">Icona in stile cristallo Obsidian con invito ad aprire il grafo 3D interattivo del vault.</desc>
  <rect width="560" height="180" rx="24" fill="#0D0F10"/>
  <rect x="1" y="1" width="558" height="178" rx="23" stroke="#2A2D32" stroke-width="2"/>

  <g opacity="0.6">
    <path d="M260 32H424" stroke="#3A3F46" stroke-width="1"/>
    <path d="M260 72H500" stroke="#3A3F46" stroke-width="1"/>
    <path d="M260 112H468" stroke="#3A3F46" stroke-width="1"/>
    <path d="M424 32L500 72L468 112" stroke="#3A3F46" stroke-width="1"/>
    <circle cx="260" cy="32" r="3" fill="#62D9A8"/>
    <circle cx="424" cy="32" r="4" fill="#A994F2"/>
    <circle cx="500" cy="72" r="5" fill="#EFC65A"/>
    <circle cx="468" cy="112" r="4" fill="#EE748A"/>
    <circle cx="260" cy="112" r="3" fill="#69B7F5"/>
  </g>

  <g filter="url(#glow)">
    <path d="M93 25L154 50L181 112L133 158L70 139L42 78L93 25Z" fill="#6D55D9"/>
    <path d="M93 25L154 50L119 83L42 78L93 25Z" fill="#9C7BFF"/>
    <path d="M154 50L181 112L119 83L93 25L154 50Z" fill="#7B61FF"/>
    <path d="M42 78L119 83L70 139L42 78Z" fill="#4E3AAE"/>
    <path d="M119 83L181 112L133 158L70 139L119 83Z" fill="#5D46C8"/>
    <path d="M93 25L119 83L70 139L42 78L93 25Z" fill="url(#facet)" opacity="0.7"/>
    <path d="M93 25L154 50L181 112L133 158L70 139L42 78L93 25Z" stroke="#D7CEFF" stroke-width="2" stroke-linejoin="round"/>
    <path d="M154 50L119 83M119 83L42 78M119 83L181 112M119 83L70 139M119 83L93 25" stroke="#D7CEFF" stroke-opacity="0.55" stroke-width="1.4"/>
  </g>

  <g>
    <text x="220" y="66" fill="#F3F1EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Visualizza il grafo 3D</text>
    <text x="220" y="96" fill="#AAA69B" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Apri il vault Obsidian interattivo di Magistra</text>
    <g transform="translate(220 116)">
      <rect width="214" height="34" rx="17" fill="#141718" stroke="#3A3F46"/>
      <circle cx="19" cy="17" r="5" fill="#62D9A8"/>
      <path d="M154 17H175" stroke="#62D9A8" stroke-width="2" stroke-linecap="round"/>
      <path d="M174 10L181 17L174 24" stroke="#62D9A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="22" fill="#F3F1EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Apri su Vercel</text>
    </g>
